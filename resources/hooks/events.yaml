# Single source for the lifecycle hook events Maestro installs and records.
#
# Read at compile time by src/domain/run/event.rs (the recorder contract) and,
# through it, by src/domain/install/hooks.rs (the installer). Editing this list
# changes both the generated .claude/settings.local.json / .codex/hooks.json and
# the events `maestro hook record` accepts.
#
# `events` is installed for every supported agent. `script` is the file under
# .maestro/hooks/ each installed hook entry runs; the installer wraps it in a
# per-agent invocation that resolves the repo root ($CLAUDE_PROJECT_DIR for Claude,
# `git rev-parse` for Codex). `codex.timeout` bounds the recorder run on Codex.
events:
  - SessionStart
  - UserPromptSubmit
  - PreToolUse
  - PermissionRequest
  - PostToolUse
  - Stop
script: record.sh
codex:
  timeout: 5
