<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maestro Deepening Opportunities</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f5f4ed;
      --paper-2: #ebe9dc;
      --ink: #1c1917;
      --muted: #6f6a61;
      --soft: #a9a397;
      --accent: #b5523a;
      --accent-tint: rgba(181, 82, 58, 0.08);
      --link: #1a70c7;
      --rule: rgba(28, 25, 23, 0.18);
      --rule-solid: #c9c3b5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Geist", system-ui, sans-serif;
    }

    main {
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 40px 24px 32px;
    }

    .kicker {
      font-family: "Geist Mono", monospace;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 40px;
      font-weight: 400;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      margin: 12px 0 28px;
    }

    .diagram-wrap {
      border: 1px solid var(--rule-solid);
      background: var(--paper);
      overflow-x: auto;
      padding: 0;
    }

    svg {
      display: block;
      width: 1192px;
      height: auto;
    }

    .title {
      font-family: "Geist", system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      fill: var(--ink);
    }

    .label {
      font-family: "Geist Mono", monospace;
      font-size: 8px;
      fill: var(--muted);
    }

    .body {
      font-family: "Geist", system-ui, sans-serif;
      font-size: 10px;
      fill: var(--muted);
    }

    .small {
      font-family: "Geist Mono", monospace;
      font-size: 8px;
      fill: var(--muted);
    }

    .section-label {
      font-family: "Geist Mono", monospace;
      font-size: 10px;
      font-weight: 600;
      fill: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .callout {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 16px;
      font-style: italic;
      fill: var(--ink);
    }

    .legend-text {
      font-family: "Geist", system-ui, sans-serif;
      font-size: 11px;
      fill: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="kicker">Maestro architecture review</div>
    <h1>Five deepening opportunities</h1>
    <p class="subtitle">
      Each opportunity turns a shallow or scattered Module into a deeper Module: smaller caller knowledge,
      more behavior behind one Interface, and stronger Locality for tests.
    </p>

    <div class="diagram-wrap" aria-label="Architecture diagram showing five Maestro deepening opportunities">
      <svg viewBox="0 0 1192 820" role="img" aria-labelledby="diagram-title diagram-desc" xmlns="http://www.w3.org/2000/svg">
        <title id="diagram-title">Maestro deepening opportunities</title>
        <desc id="diagram-desc">Current shallow seams feed five deeper modules, which produce locality, leverage, and stronger tests.</desc>

        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
          <pattern id="paper-dot" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="rgba(28,25,23,0.12)"/>
          </pattern>
        </defs>

        <rect x="0" y="0" width="1192" height="820" fill="#f5f4ed"/>
        <rect x="0" y="0" width="1192" height="720" fill="url(#paper-dot)" opacity="0.55"/>

        <text x="48" y="56" class="section-label">Current friction</text>
        <text x="424" y="56" class="section-label">Deepened Modules</text>
        <text x="900" y="56" class="section-label">What gets easier</text>

        <rect x="32" y="80" width="248" height="548" rx="8" fill="#ebe9dc" stroke="#c9c3b5" stroke-width="1"/>
        <rect x="48" y="104" width="52" height="16" rx="2" fill="transparent" stroke="#a9a397" stroke-width="0.8"/>
        <text x="74" y="116" text-anchor="middle" class="label">TODAY</text>
        <text x="156" y="156" text-anchor="middle" class="title">Shallow seams</text>
        <text x="156" y="180" text-anchor="middle" class="body">Callers know too much</text>
        <text x="156" y="212" text-anchor="middle" class="small">scattered policy</text>
        <text x="156" y="236" text-anchor="middle" class="small">duplicated projection</text>
        <text x="156" y="260" text-anchor="middle" class="small">manual release gates</text>
        <text x="156" y="284" text-anchor="middle" class="small">command-level assembly</text>
        <text x="156" y="332" text-anchor="middle" class="callout">Deletion test signal:</text>
        <text x="156" y="356" text-anchor="middle" class="body">remove the helper and</text>
        <text x="156" y="376" text-anchor="middle" class="body">complexity leaks into callers.</text>
        <text x="156" y="428" text-anchor="middle" class="small">verified checks:</text>
        <text x="156" y="452" text-anchor="middle" class="small">check:boundaries passed</text>
        <text x="156" y="476" text-anchor="middle" class="small">check:skills passed</text>
        <text x="156" y="500" text-anchor="middle" class="small">check:bundled-skills failed</text>
        <text x="156" y="524" text-anchor="middle" class="small">on .DS_Store artifact</text>

        <rect x="888" y="80" width="272" height="548" rx="8" fill="#ebe9dc" stroke="#c9c3b5" stroke-width="1"/>
        <rect x="904" y="104" width="52" height="16" rx="2" fill="transparent" stroke="#a9a397" stroke-width="0.8"/>
        <text x="930" y="116" text-anchor="middle" class="label">NEXT</text>
        <text x="1024" y="156" text-anchor="middle" class="title">Deep Interfaces</text>
        <text x="1024" y="184" text-anchor="middle" class="body">One place owns each rule</text>
        <text x="1024" y="224" text-anchor="middle" class="small">Locality: bugs fixed once</text>
        <text x="1024" y="256" text-anchor="middle" class="small">Leverage: many callers benefit</text>
        <text x="1024" y="288" text-anchor="middle" class="small">Tests: Interface-first coverage</text>
        <text x="1024" y="320" text-anchor="middle" class="small">Agents: easier navigation</text>
        <text x="1024" y="376" text-anchor="middle" class="callout">Do all five, but start</text>
        <text x="1024" y="400" text-anchor="middle" class="callout">where the checks already fail.</text>
        <text x="1024" y="452" text-anchor="middle" class="small">1. skill source collection</text>
        <text x="1024" y="476" text-anchor="middle" class="small">2. release gate</text>
        <text x="1024" y="500" text-anchor="middle" class="small">3. handoff reads</text>
        <text x="1024" y="524" text-anchor="middle" class="small">4. task inspection</text>
        <text x="1024" y="548" text-anchor="middle" class="small">5. snapshot modules</text>

        <!-- arrows from current friction to deepened modules -->
        <line x1="280" y1="140" x2="392" y2="140" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="280" y1="248" x2="392" y2="248" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="280" y1="356" x2="392" y2="356" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="280" y1="464" x2="392" y2="464" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="280" y1="572" x2="392" y2="572" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- arrows from deepened modules to outcomes -->
        <line x1="800" y1="140" x2="888" y2="140" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
        <line x1="800" y1="248" x2="888" y2="248" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="800" y1="356" x2="888" y2="356" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="800" y1="464" x2="888" y2="464" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="800" y1="572" x2="888" y2="572" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <path d="M600 176 C600 204 600 204 600 220" fill="none" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
        <rect x="560" y="194" width="80" height="16" rx="2" fill="#f5f4ed"/>
        <text x="600" y="205" text-anchor="middle" class="label">GATES RELEASE</text>

        <!-- node 1 -->
        <rect x="392" y="96" width="408" height="88" rx="6" fill="#f5f4ed"/>
        <rect x="392" y="96" width="408" height="88" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <rect x="408" y="112" width="44" height="16" rx="2" fill="transparent" stroke="#b5523a" stroke-width="0.8"/>
        <text x="430" y="124" text-anchor="middle" class="label">SPEC</text>
        <text x="596" y="126" text-anchor="middle" class="title">Bundled Skill Source Collection</text>
        <text x="596" y="150" text-anchor="middle" class="body">Explicit shipped-content rule for skills/bundled</text>
        <text x="596" y="170" text-anchor="middle" class="small">sync-bundled-skills.ts, bundled-skill-templates.test.ts</text>

        <!-- node 2 -->
        <rect x="392" y="204" width="408" height="88" rx="6" fill="#f5f4ed"/>
        <rect x="392" y="204" width="408" height="88" rx="6" fill="#f5f4ed" stroke="#c9c3b5" stroke-width="1"/>
        <rect x="408" y="220" width="44" height="16" rx="2" fill="transparent" stroke="#a9a397" stroke-width="0.8"/>
        <text x="430" y="232" text-anchor="middle" class="label">GATE</text>
        <text x="596" y="234" text-anchor="middle" class="title">Release Gate For Agent-Facing Spec</text>
        <text x="596" y="258" text-anchor="middle" class="body">One release-readiness check for binary plus skill parity</text>
        <text x="596" y="278" text-anchor="middle" class="small">package.json, build.ts, ci.ts, release workflow</text>

        <!-- node 3 -->
        <rect x="392" y="312" width="408" height="88" rx="6" fill="#f5f4ed"/>
        <rect x="392" y="312" width="408" height="88" rx="6" fill="#f5f4ed" stroke="#c9c3b5" stroke-width="1"/>
        <rect x="408" y="328" width="44" height="16" rx="2" fill="transparent" stroke="#a9a397" stroke-width="0.8"/>
        <text x="430" y="340" text-anchor="middle" class="label">READ</text>
        <text x="596" y="342" text-anchor="middle" class="title">Project-Scoped Handoff Reads</text>
        <text x="596" y="366" text-anchor="middle" class="body">Visibility, open-state, project scope, and reconciliation together</text>
        <text x="596" y="386" text-anchor="middle" class="small">list/show/open-for-task/reconcile</text>

        <!-- node 4 -->
        <rect x="392" y="420" width="408" height="88" rx="6" fill="#f5f4ed"/>
        <rect x="392" y="420" width="408" height="88" rx="6" fill="#f5f4ed" stroke="#c9c3b5" stroke-width="1"/>
        <rect x="408" y="436" width="44" height="16" rx="2" fill="transparent" stroke="#a9a397" stroke-width="0.8"/>
        <text x="430" y="448" text-anchor="middle" class="label">TASK</text>
        <text x="596" y="450" text-anchor="middle" class="title">Task Inspection Module</text>
        <text x="596" y="474" text-anchor="middle" class="body">Task row, continuation, blockers, events, and handoffs as one view</text>
        <text x="596" y="494" text-anchor="middle" class="small">show-task, task-continuation, task.command</text>

        <!-- node 5 -->
        <rect x="392" y="528" width="408" height="88" rx="6" fill="#f5f4ed"/>
        <rect x="392" y="528" width="408" height="88" rx="6" fill="#f5f4ed" stroke="#c9c3b5" stroke-width="1"/>
        <rect x="408" y="544" width="44" height="16" rx="2" fill="transparent" stroke="#a9a397" stroke-width="0.8"/>
        <text x="430" y="556" text-anchor="middle" class="label">TUI</text>
        <text x="596" y="558" text-anchor="middle" class="title">Mission Control Snapshot Modules</text>
        <text x="596" y="582" text-anchor="middle" class="body">Named read models behind the same snapshot Interface</text>
        <text x="596" y="602" text-anchor="middle" class="small">snapshot.ts, mission-control.command.ts, screen tests</text>

        <rect x="0" y="680" width="1192" height="140" fill="#ebe9dc" stroke="#c9c3b5" stroke-width="1"/>
        <text x="48" y="716" class="section-label">Legend</text>
        <rect x="48" y="736" width="20" height="12" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="80" y="746" class="legend-text">Accent = start here because it has a live failing check.</text>
        <line x1="408" y1="742" x2="456" y2="742" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <text x="472" y="746" class="legend-text">Arrow = complexity currently leaks into callers, then returns to one deeper Module.</text>
        <line x1="48" y1="780" x2="96" y2="780" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
        <text x="112" y="784" class="legend-text">Accent arrow = bundled source collection should feed release readiness.</text>
      </svg>
    </div>
  </main>
</body>
</html>
