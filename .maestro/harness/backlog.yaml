- id: hb-012
  fingerprint: agent_audit:proof-command-timeout
  source: cli-2026-06-08
  provenance: agent-audit
  topic: proof-command-timeout
  type: agent_audit
  title: Proof command execution has no timeout; a hung verify command blocks task_verify forever
  priority: medium
  occurrences: 1
  sessions_hit:
  - cli-2026-06-08
  first_seen: 2026-06-08T06:55:53.768Z
  last_seen: 2026-06-08T06:55:53.768Z
  status: proposed
  evidence:
  - 'cli-2026-06-08: src/domain/proof/commands.rs:94 spawns ''sh -c <cmd>'' and commands.rs:32 records exit_code (verify_task.rs:405 fails on non-zero), but no timeout/kill path exists anywhere in src/domain/proof/. A wedged check (watch process, stdin-waiting prompt, hung test runner) hangs ''maestro feature verify --prove'' / task_verify with no recovery. Idea source: oh-my-openagent comment-checker runner.ts:29-57 bounds each gate at 30s with SIGTERM then a 1s grace then SIGKILL. Fix: wrap the existing spawn in a bounded wait (config default a few minutes) that escalates SIGTERM->SIGKILL and records a ''timeout'' outcome distinct from exit!=0.'
- id: hb-013
  fingerprint: agent_audit:run-event-harness-attribution
  source: cli-2026-06-08
  provenance: agent-audit
  topic: run-event-harness-attribution
  type: agent_audit
  title: Run events do not record which harness/agent fired them; the agent field is inconsistent and unsurfaced
  priority: medium
  occurrences: 1
  sessions_hit:
  - cli-2026-06-08
  first_seen: 2026-06-08T06:55:53.795Z
  last_seen: 2026-06-08T06:55:53.795Z
  status: proposed
  evidence:
  - 'cli-2026-06-08: run events carry no harness identity (claude vs codex). The ''agent'' field is copied through at src/domain/run/record.rs:80 but the CLI sets it at src/interfaces/cli/hook.rs:40 to super::actor() -- it names the recording actor (e.g. ''maestro''), NOT the driving harness; it is present on CLI-issued events (.maestro/runs/cli-2026-06-07/events.jsonl line 1) and absent on hook-recorded task_proof events (lines 2-3) because the hook payload has no ''agent''. embedded/hooks/record.sh is a thin ''exec maestro hook record'' shim forwarding the raw stdin payload (the $CLAUDE_PROJECT_DIR vs git-rev-parse detail is per-agent INVOCATION wiring noted in events.yaml comments, not something record.sh stamps). Run dirs key on session_id only; ''unattributed'' (event.rs:42) means missing session, not missing agent. No reader/status/decision surfaces ''agent'' (zero consumers). Idea source: oh-my-openagent boulder session_origins ''direct''|''appended'' + codex:/opencode: prefixes (boulder-state types.ts:12,19). IMPLEMENTER FIRST STEP (falsify ''never encodes'' before coding): capture one real Claude and one real Codex hook payload side by side -- they may already differ (cwd, transcript_path, env). Then choose stamp-at-install (the harness is known when writing .claude/settings.local.json vs .codex/hooks.json) OR surface a discriminator already in the payload. Do not assume record.sh is the edit site.'
- id: hb-014
  fingerprint: agent_audit:forward-fed-task-learnings
  source: cli-2026-06-08
  provenance: agent-audit
  topic: forward-fed-task-learnings
  type: agent_audit
  title: Discovered task learnings/gotchas are not carried to dependent tasks (decisions store covers rationale only)
  priority: medium
  occurrences: 1
  sessions_hit:
  - cli-2026-06-08
  first_seen: 2026-06-08T06:55:53.816Z
  last_seen: 2026-06-08T06:55:53.816Z
  status: proposed
  evidence:
  - 'cli-2026-06-08: DecisionRecord {title, context} (src/domain/decisions/schema.rs:25-32) captures locked decisions/rationale, and the resume-prior-task-context feature (in design) adds per-task/feature resume.md + notes.md for resuming the SAME unit -- but nothing surfaces one task''s mid-implementation gotchas/conventions to its DEPENDENT/downstream tasks, so each task rediscovers them. Idea source: oh-my-openagent accumulates .omo/notepads/{plan}/ split into patterns | rationale | gotchas and feeds them to later subagents (docs/guide/orchestration.md). LEAN CAVEAT: do NOT build a notepad subsystem; lightest viable form is a freeform ''learned/gotchas'' note on task completion that the next dependent task''s brief surfaces. Evaluate as a thin extension of resume-prior-task-context''s notes.md before treating it as a new feature.'
