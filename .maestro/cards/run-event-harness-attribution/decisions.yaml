- schema_version: maestro.card.v1
  id: card-e9760f
  type: decision
  title: Harness detected from CLAUDE_PROJECT_DIR env at record time
  status: locked
  parent: run-event-harness-attribution
  created_at: 2026-06-08T07:22:46.048Z
  updated_at: 2026-06-08T07:22:46.078Z
  description: 'record.sh is ''exec maestro hook record'' (no $@). The installer already emits per-harness commands (src/domain/install/hooks.rs): Claude relies on $CLAUDE_PROJECT_DIR, Codex self-discovers via git rev-parse because it has no such var. That asymmetry is already trusted by install, so the recorder can read its own env. Stamp-at-install rejected: 3 touch points (installer -> record.sh forward $@ -> hook record parse) and record.sh is user-editable so an edit can drop the stamp. Payload-shape detection rejected as brittle.'
  extra:
    id: card-e9760f
    title: Harness detected from CLAUDE_PROJECT_DIR env at record time
    status: locked
    feature: run-event-harness-attribution
    context: 'record.sh is ''exec maestro hook record'' (no $@). The installer already emits per-harness commands (src/domain/install/hooks.rs): Claude relies on $CLAUDE_PROJECT_DIR, Codex self-discovers via git rev-parse because it has no such var. That asymmetry is already trusted by install, so the recorder can read its own env. Stamp-at-install rejected: 3 touch points (installer -> record.sh forward $@ -> hook record parse) and record.sh is user-editable so an edit can drop the stamp. Payload-shape detection rejected as brittle.'
    decision: 'maestro hook record derives the harness from its own environment: CLAUDE_PROJECT_DIR present -> claude; absent -> codex (the only other installed harness today). If neither is determinable in a future multi-harness world, record harness as unset rather than mislabel. Applies to both the stdin hook path and the --event CLI path (CLAUDE_PROJECT_DIR is set for Claude bash/tool calls too).'
    rejected:
    - 'Stamp at install: 3 touch points + user-editable record.sh that can drop the stamp. Payload-shape guess: brittle, breaks if either tool changes its payload format.'
    preview: 'hook record reads env: CLAUDE_PROJECT_DIR set -> harness=claude; not set -> harness=codex; no install or record.sh change'
    created_at: 2026-06-08T07:22:46.048Z
    locked_at: 2026-06-08T07:22:46.078Z
