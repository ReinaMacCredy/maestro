  updated_at: 2026-06-08T07:23:17.329Z
  description: The existing 'agent' field means the recording tool (= 'maestro', set at src/interfaces/cli/hook.rs:40 via actor()); reusing it would conflate recorder with harness and break existing agent=maestro events. The run reader surfaces no provenance today, so recording a harness only helps if a consumer shows it.
  extra:
    id: card-cde806
    title: Harness stored in a new event field, surfaced in the run reader
    status: locked
    feature: run-event-harness-attribution
    context: The existing 'agent' field means the recording tool (= 'maestro', set at src/interfaces/cli/hook.rs:40 via actor()); reusing it would conflate recorder with harness and break existing agent=maestro events. The run reader surfaces no provenance today, so recording a harness only helps if a consumer shows it.
    decision: Recorded events gain a new 'harness' field (claude|codex|unset), distinct from 'agent'. The run reader (src/domain/run/reader.rs) surfaces it for per-event provenance. status integration is out of scope for v1.
    rejected:
    - 'Overload the existing ''agent'' field: conflates the recording tool (maestro) with the driving harness and breaks existing agent=maestro events.'
