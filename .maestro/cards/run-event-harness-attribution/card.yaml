schema_version: maestro.card.v1
id: run-event-harness-attribution
type: feature
title: run event harness attribution
status: proposed
created_at: 2026-06-08T07:22:45.987Z
updated_at: 2026-06-08T07:23:17.353Z
description: 'Run events do not record which harness (claude vs codex) produced them. The ''agent'' field is copied through at src/domain/run/record.rs:80 but the CLI sets it at src/interfaces/cli/hook.rs:40 to super::actor() -- it names the recording tool (''maestro''), not the driving harness; present on CLI-issued events, absent on hook-recorded task_proof events because the stdin payload has no ''agent''. record.sh is ''exec maestro hook record'' (no $@). The installer already emits per-harness commands (src/domain/install/hooks.rs): Claude uses $CLAUDE_PROJECT_DIR, Codex uses git rev-parse (no such var). Run dirs key on session_id only; ''unattributed'' (event.rs:42) means missing session, not missing agent. No reader surfaces ''agent''. Origin: audit backlog hb-013; idea source oh-my-openagent boulder session_origins.'
extra:
  schema_version: maestro.feature.v2
  id: run-event-harness-attribution
  title: run event harness attribution
  description: 'Run events do not record which harness (claude vs codex) produced them. The ''agent'' field is copied through at src/domain/run/record.rs:80 but the CLI sets it at src/interfaces/cli/hook.rs:40 to super::actor() -- it names the recording tool (''maestro''), not the driving harness; present on CLI-issued events, absent on hook-recorded task_proof events because the stdin payload has no ''agent''. record.sh is ''exec maestro hook record'' (no $@). The installer already emits per-harness commands (src/domain/install/hooks.rs): Claude uses $CLAUDE_PROJECT_DIR, Codex uses git rev-parse (no such var). Run dirs key on session_id only; ''unattributed'' (event.rs:42) means missing session, not missing agent. No reader surfaces ''agent''. Origin: audit backlog hb-013; idea source oh-my-openagent boulder session_origins.'
  status: proposed
  created_at: 2026-06-08T07:22:45.987Z
  updated_at: 2026-06-08T07:23:17.353Z
  affected_areas:
  - src/interfaces/cli/hook.rs + src/interfaces/hooks/record.rs (env detection, stamp harness on both paths)
  - src/domain/run/record.rs (carry harness field through)
  - src/domain/run/reader.rs (surface harness)
  - tests
  acceptance:
  - Recorded run events carry a 'harness' field set to claude when CLAUDE_PROJECT_DIR is present in the recorder environment and codex when absent, applied on both the stdin hook path and the --event CLI path.
  - The 'harness' field is distinct from 'agent' (which stays the recording tool); existing agent=maestro events are unchanged.
  - If neither harness is determinable, harness is recorded as unset rather than mislabeled.
  - The run reader surfaces the harness for each event.
  - 'Real case: a ''maestro hook record'' invocation with CLAUDE_PROJECT_DIR set writes harness=claude to events.jsonl; with it unset writes harness=codex.'
