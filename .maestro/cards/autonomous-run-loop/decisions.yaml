- schema_version: maestro.card.v1
  id: dec-where-the-autonomous-loop-lives-87cc
  type: decision
  title: Where the autonomous loop lives
  status: locked
  parent: autonomous-run-loop
  created_at: 2026-06-12T11:12:22.094Z
  updated_at: 2026-06-12T11:17:51.000Z
  description: 'Maestro is passive by standing decision (2026-04-08: no cron/daemon/background). An overnight loop needs a driver somewhere: inside a long-lived agent session, in an external scheduler spawning fresh sessions, or inside maestro itself (which would supersede the standing decision and the Symphony ''daemon locked out'' verdict).'
  extra:
    locked_at: 2026-06-12T11:17:51.000Z
    decision: 'Agent-side, in-session primary: loop.md targets one long-lived bedtime session (claim->work->verify->complete->wakeup->repeat; stop on backlog dry / morning / N consecutive fails; ends with a morning report). Plus a short Scheduler-variant subsection: a cron/launchd//schedule firing runs ONE iteration of the same loop then exits (claim verb already guards overlapping firings). Maestro stays passive - keeps the 2026-04-08 no-daemon decision.'
    preview: 'bedtime: ''work the backlog until morning'' -> one session loops claim/work/verify/complete with self-paced wakeups, stops on dry|morning|fails, leaves morning report; loop.md also documents scheduler firing = one iteration'
    rejected:
    - 'maestro run driver verb: would supersede the no-daemon decision and the Symphony ''daemon locked out'' verdict, and pull agent process/auth/model management into maestro'
    - 'In-session only: smallest text but leaves scheduler users with no guidance for a 3-4 line cost'
    - 'Scheduler-first: crash-proof but needs per-machine external setup and cold context per unit; more than the ''while I sleep'' use case asks for'
