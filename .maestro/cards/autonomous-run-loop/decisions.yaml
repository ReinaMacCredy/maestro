- schema_version: maestro.card.v1
  id: dec-tdd-strictness-for-unattended-units-aa23
  type: decision
  title: TDD strictness for unattended units
  status: locked
  parent: autonomous-run-loop
  created_at: 2026-06-12T11:19:42.958Z
  updated_at: 2026-06-12T11:19:51.309Z
  description: Overnight there is no human mid-flight review; tests and the proof gate are the only safety net. work.md (in-flight via tdd-skill-adoption) sets the test-first default with a skip-with-noted-reason escape hatch normally judged by a nearby human.
  extra:
    locked_at: 2026-06-12T11:19:51.309Z
    decision: 'Inherit work.md''s rule unchanged day and night (implement-lane + testable --check -> red->green per tdd.md; non-testable skips with a noted reason). loop.md adds only: the morning report lists every unit where TDD was skipped plus the reason, so the human judges skips at coffee.'
    preview: 'MORNING REPORT: card-a1 verified (tdd: 3 cycles); card-b2 verified (tdd: skipped - config-only change)'
    rejected:
    - 'Strict-at-night override (block untestable cards for morning): nothing untested lands while asleep, but creates two rules to keep in sync and piles up config/docs cards overnight'
- schema_version: maestro.card.v1
  id: dec-night-scope-when-ready-runs-dry-74f2
  type: decision
  title: Night scope when ready runs dry
  status: locked
  parent: autonomous-run-loop
  created_at: 2026-06-12T11:21:10.125Z
  updated_at: 2026-06-12T11:21:18.117Z
  description: 'Store reality: ready backlog is usually thin (1 ready card today) because the human is the one decomposing features into tasks. feature accept freezes a contract and is human judgment, so it cannot move to night under any option.'
  extra:
    locked_at: 2026-06-12T11:21:18.117Z
    decision: 'Work + replenish: the loop works ready cards; when dry it looks for accepted features without tasks, runs the prepare step to decompose the frozen contract into tasks, and continues. When nothing is workable or preparable, it stops. Bedtime ritual: human accepts the features they want built, then starts the loop. feature accept never happens at night.'
    preview: ready? yes->claim/work/verify | no-> accepted feature w/o tasks? yes->prepare->continue | no->stop + morning report
    rejected:
    - 'Work-only: most predictable but starves most nights (1 ready card today); forces the human to pre-stage tasks every evening'
    - 'Replenish + audit-to-file: wakes up to a triage-ready pipeline but is unbounded card generation while unwatched, right after the card-sprawl cleanup cycle'
- schema_version: maestro.card.v1
  id: dec-night-verb-boundaries-3e7a
  type: decision
  title: Night verb boundaries
  status: locked
  parent: autonomous-run-loop
  created_at: 2026-06-12T11:22:10.862Z
  updated_at: 2026-06-12T11:22:17.991Z
  description: 'Standing policies already fix most of the list: per-step local commits on a feature branch are durably authorized; push/tag/publish always needs the human; feature accept locked daytime-only by dec-night-scope. The one open verb was feature ship when the gate passes mid-night.'
  extra:
    locked_at: 2026-06-12T11:22:17.991Z
    decision: 'Night MAY: claim, work, complete, verify, prepare, note, block, local per-step commits on the feature branch. Night NEVER: feature accept, feature ship, archive, push/tag/publish, force/destructive git ops, hand-editing card store internals. When a feature''s gate would pass (all tasks verified + qa-slice evidence green) the loop stops that feature at SHIP-READY and the morning report hands the human the rollup plus the exact ship command.'
    preview: 'MORNING REPORT: feature X SHIP-READY - 5/5 tasks verified, qa-slice green -> review rollup, run: feature ship X'
    rejected:
    - 'Ship-when-gate-passes: fully hands-off lifecycle bottom, but the contract gets declared delivered with nobody reviewing the rollup, and a wrong ship is noisy to unwind'
- schema_version: maestro.card.v1
  id: dec-stop-conditions-e3e6
  type: decision
  title: Stop conditions
  status: locked
  parent: autonomous-run-loop
  created_at: 2026-06-12T11:24:56.714Z
  updated_at: 2026-06-12T11:25:07.902Z
  description: A skill recipe cannot know wake time or budget; the bedtime prompt could carry caps. Question was whether a stop time is required, optional, or ignored.
  extra:
    locked_at: 2026-06-12T11:25:07.902Z
    decision: 'Run until done, review in the morning (user''s words: ''no it just run until done and i wake up then review''). No stop time is ever required. Built-in stops: (1) backlog dry - nothing workable or preparable; (2) a card failing 3 attempts is blocked with a reason and skipped; (3) 3 consecutive blocked cards = systemic problem, end the night early. If the kickoff prompt happens to state a time or unit cap, the recipe honors it; it never asks for one.'
    preview: 'you: ''work the backlog while I sleep'' -> loop runs; stops on dry or 3 consecutive blocks; morning report waits for review'
    rejected:
    - 'Clock always required: hard upper bound but bedtime friction; redundant since dry + failure stops bound the night'
    - 'Times ignored entirely: simplest text but silently ignores caps the user naturally says at bedtime'
