schema_version: maestro.card.v1
id: autonomous-run-loop
type: feature
title: autonomous run loop
status: shipped
deps:
- kind: blocks
  target: tdd-skill-adoption
created_at: 2026-06-12T11:11:49.009Z
updated_at: 2026-06-12T20:36:12.203Z
description: 'Maestro-tracked work should keep progressing while the user is away/asleep. Today maestro is passive: it tracks cards and answers ready/status/list (all with --json since the maintainability work), but nothing drives an agent through the backlog; every unit of work needs a human-initiated session. Standing decision (2026-04-08 feedback): no cron/daemon/background inside maestro - scheduling lives outside. Symphony eval (2026-06-11) parked ''maestro-as-tracker for an external driver'' noting ready/list lacked --json (now closed).'
extra:
  schema_version: maestro.feature.v2
  outcome: Added the maestro-card unattended loop reference and routed away/asleep backlog work through the shipped skill and harness resources.
  non_goals:
  - No daemon, scheduler, or run verb inside maestro - the 2026-04-08 no-daemon decision stands
  - No new CLI verbs or JSON surfaces (ready/list/status --json already exist)
  - No new bundled skill (loop.md is a maestro-card reference)
  affected_areas:
  - embedded/skills/maestro-card (SKILL.md + new reference/loop.md)
  - embedded/harness/HARNESS.md (orchestration menu line)
  - skills extraction guard tests (re-record)
  qa:
    surface: none
    reason: static skill reference content only (new loop.md + routing lines); no new runtime behavior surface — extraction/sync paths already guard-tested
    amend_log_position: 0
  acceptance_sweeps:
  - at: 2026-06-12T20:36:00.229Z
    resolved:
    - ac-1
    - ac-2
    - ac-3
    - ac-4
    - ac-5
    - ac-6
  acceptance:
  - 'embedded/skills/maestro-card/reference/loop.md exists carrying the unattended loop: loop body that defers to work.md per unit (no duplicated loop text), replenish step (when ready is dry, prepare accepted features that lack tasks), built-in stops (dry; card failing 3 attempts -> block with reason and skip; 3 consecutive blocks -> end the night), kickoff time/unit caps honored when stated but never required, and a scheduler-variant subsection (one external firing = one loop iteration, claim guards overlap)'
  - 'loop.md states the night verb boundaries: MAY claim/work/complete/verify/prepare/note/block + local per-step commits on the feature branch; NEVER feature accept, feature ship, archive, push/tag/publish, destructive git ops, or hand-editing card store internals; a passing ship gate parks the feature at SHIP-READY'
  - 'loop.md defines the morning report: per-unit outcomes including TDD cycles or skip reasons, blocked cards with reasons, and SHIP-READY features with the exact feature ship command to run'
  - maestro-card SKILL.md routes unattended backlog work to reference/loop.md and its version is bumped; the extraction guard is re-recorded so init/sync deliver the new file
  - embedded/harness/HARNESS.md orchestration menu carries one line routing unattended/overnight backlog work to the autonomous loop (maestro-card)
  - 'reference/work.md is unchanged by this feature: TDD text lands via tdd-skill-adoption (this card is dep-blocked on it) and loop.md only references it'
