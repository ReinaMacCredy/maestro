  id: no-dead-end-errors
  title: No dead-end errors
  description: 'Errors with a known recovery must name it. Live failure 2026-06-07: maestro status on a v1-artifact repo exited 1 with schema mismatch for ... expected maestro.feature.v2, found maestro.feature.v1 and no fix line; the recovery (migrate-v2) was only discoverable via git log. Typed errors live in MaestroError (src/foundation/core/error.rs, 8 variants, no hints); all CLI errors funnel through one print site (src/main.rs:8-10); some surfaces already hand-roll fix: lines (task/doctor.rs:152, verify fail-closed). Drift evidence: src/domain/decisions/query.rs:336 hand-formats a duplicate of the SchemaMismatch message.'
  status: shipped
  created_at: 2026-06-07T15:04:09.033Z
