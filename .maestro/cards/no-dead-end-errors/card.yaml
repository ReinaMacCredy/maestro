  affected_areas:
  - src/foundation/core/error.rs (hint method + test)
  - src/main.rs (error print site)
  - src/domain/decisions/query.rs (dedupe ad-hoc message)
  acceptance:
  - MaestroError exposes hint() -> Option<String> naming the recovery command; a unit test enforces every variant has an explicit Some/None mapping so new variants cannot skip the decision
  - 'the single CLI error print site (src/main.rs) appends a fix: <hint> line when the error chain downcasts to a hinted MaestroError; unhinted errors render unchanged'
  - 'SchemaMismatch hints fix: run maestro migrate-v2 when a v1 task/feature artifact meets a v2-expecting binary; other schema mismatches hint maestro doctor'
  - the ad-hoc schema-mismatch message at src/domain/decisions/query.rs:336 is repointed to the typed MaestroError::SchemaMismatch (no hand-formatted duplicates)
  - 'real case: maestro status in a repo with v1 feature artifacts exits non-zero and stderr contains fix: run maestro migrate-v2'
  acceptance_evidence:
  - ac_id: ac-1
    kind: explicit
    text: cargo test --test core_schema_error typed_errors_have_explicit_hint_decisions passed; the test enumerates MaestroError variants through HintCase and fails to compile when a new variant lacks an explicit Some/None hint decision
    at: 2026-06-07T16:53:24.283Z
