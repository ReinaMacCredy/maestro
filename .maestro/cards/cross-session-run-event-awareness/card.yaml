schema_version: maestro.card.v1
id: cross-session-run-event-awareness
type: feature
title: Cross-session run-event awareness
status: ready
created_at: 2026-06-13T15:43:42.330Z
updated_at: 2026-06-13T16:54:20.870Z
description: A starting session needs to see what other LIVE sessions are doing (which card, how far along) without manually reading each card, so it can orient and -- when another session is on a related card -- run 'maestro link' to connect them. Delivered as an explicit read verb the agent runs as its first step (pull-only). May require 'hook record' to carry which card/feature a session is bound to.
extra:
  schema_version: maestro.feature.v2
  non_goals:
  - No daemon/watcher/auto-refresh; pull-only one-shot (maestro passivity).
  - No automatic linking and no relatedness heuristic; the agent judges relatedness and runs maestro link.
  - No new SessionEnd hook added to the contract.
  - No streaming/tail/live-follow mode.
  - Changing claim_session() (mod.rs:1280) session identity -- out of scope; D9 edits cli_run_id() only, leaving the per-process claim-collision invariant (mod.rs:1276-1279) intact. Flagged as an adjacent finding, not part of this contract.
  acceptance:
  - maestro active lists each session whose latest run event is within the recency window, one row per session, showing session id, mode (from latest skill_activation), bound card title, card status, a type-aware progress metric, last action, last-activity age, and presence state ([working]/[waiting]/[idle Nm]); the running session is marked 'you'.
  - Sessions whose latest event is older than the window are hidden by default; maestro active --all includes them tagged [stale Nm].
  - 'Liveness is computed from last-event recency, NOT from Stop: a session whose latest event is a recent Stop shows as live/[waiting]; there is no Stop-based exclusion and no new hook is added.'
  - Card-mutating verbs (feature new/set/spec, decision new/lock, card create/update/note/close, claim) auto-emit a run event tagged with the session id and the touched card id; a session's current card resolves to its most recent such event (latest-touch-wins).
  - maestro active prints a copy-pasteable 'maestro link add <your-card> <their-card>' hint for shown peer sessions; it never runs link itself and never computes a relatedness guess.
  - maestro hook record echoes a verbose block (event, skill, session, bound card, run dir, 'maestro active' tip) for low-frequency events (skill_activation, SessionStart, card_touch), and a terse single line on high-frequency tool events.
  - Nothing fires at session start automatically; maestro active is run deliberately by the agent (pull-only).
  - Two parallel real Claude Code sessions, each running maestro card/decision/skill verbs, produce two DISTINCT rows in maestro active -- not one merged cli-<date> row (D9)
  affected_areas:
  - 'src/interfaces/cli: new ''active'' subcommand + --all flag; enriched verbose record echo in hook.rs (print site doctor noted at hook.rs:58)'
  - 'src/domain/run/reader.rs: cross-session merge by ts, recency-based liveness, presence-state ([working]/[waiting]/[idle]/[stale]) + last-action + age derivation'
  - 'src/domain/run/record.rs + event.rs: card_touch event kind/tagging and verbose-vs-terse echo formatting'
  - card-verb call sites (feature/decision/card/claim) to auto-emit a card_touch run event tagged session+card
  - 'skills (maestro-design/maestro-card): teach running maestro active as a session''s first step (downstream doc change)'
  - src/interfaces/cli/mod.rs:1253 cli_run_id() -- add CLAUDE_CODE_SESSION_ID ahead of the cli-<date> fallback (D9) so CLI-path (card-touch, skill_activation) and hook-stdin-path events for one session share one per-session bucket
  open_questions:
  - 'Recency window + live-threshold default values (D4 left tunable: live ~5m, window ~30m).'
  - Exact column widths / truncation lengths for the digest row (D5 tunable).
  - 'card_touch representation: a new event_type in events.jsonl vs an existing event carrying a card_id field (impl detail for maestro-card).'
  - Should maestro active read only managed run logs, or also the cli-<date> fallback buckets (cli-date collapse noted in Current state)?
