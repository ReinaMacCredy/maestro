- schema_version: maestro.card.v1
  id: dec-playbook-delivery-mechanism-b928
  type: decision
  title: Playbook delivery mechanism
  status: locked
  parent: code-playbook-per-language-styleguides-surfaced-on-demand
  created_at: 2026-06-14T15:04:05.372Z
  updated_at: 2026-06-14T15:04:05.391Z
  description: How do per-language styleguides reach the agent? Inline-in-HARNESS would bloat the always-loaded protocol with 9+ languages of detail. Supersedes the inline 7-bullet approach from archived feature code-playbook-styleguides-surfaced-to-agents.
  extra:
    locked_at: 2026-06-14T15:04:05.391Z
    decision: On-demand files. Vendor per-language guides as an embedded resource tree maestro extracts to .maestro/playbook/<lang>.md on init/install/sync. HARNESS.md keeps its 7 general bullets inline and points at the folder; the agent reads only the file matching the language it is editing, so context stays lean.
    preview: |-
      HARNESS.md ## Code style
        - 7 general bullets (inline, always loaded)
        - "Per-language guides live in .maestro/playbook/<lang>.md"
                           |
                           v
      .maestro/playbook/          (extracted on init/install/sync)
        PLAYBOOK.md   anchor: index + version gate
        rust.md  python.md  go.md  typescript.md  ...
             ^
             agent reads ONLY the file for the language it edits
    rejected:
    - Inline all languages in HARNESS.md (bloats the always-loaded protocol)
    - Single monolithic PLAYBOOK.md with every language (agent loads all to read one)
- schema_version: maestro.card.v1
  id: dec-playbook-language-scope-107b
  type: decision
  title: Playbook language scope
  status: locked
  parent: code-playbook-per-language-styleguides-surfaced-on-demand
  created_at: 2026-06-14T15:04:12.887Z
  updated_at: 2026-06-14T15:04:12.911Z
  description: Which languages ship? Gemini Conductor's code_styleguides has 9 files (cpp, csharp, dart, general, go, html-css, javascript, python, typescript) but no Rust. Maestro is a Rust codebase, so the most relevant guide would be missing.
  extra:
    locked_at: 2026-06-14T15:04:12.911Z
    decision: All 9 + author rust.md. Vendor all 9 Gemini files byte-verbatim (Apache-2.0; attribution + NOTICE preserved in the PLAYBOOK.md anchor) PLUS a maestro-authored rust.md. On-demand loading makes the extra file free when unused.
    preview: |-
      embedded/playbook/   (11 files, one folder gate via PLAYBOOK.md version)
        PLAYBOOK.md   anchor: frontmatter version, Apache-2.0 NOTICE, index
        [verbatim from Gemini CLI Conductor, Apache-2.0]
          cpp.md  csharp.md  dart.md  general.md  go.md
          html-css.md  javascript.md  python.md  typescript.md
        [maestro-authored]
          rust.md   Gemini set has no Rust; this is a Rust repo
    rejected:
    - Only the 9 Gemini files (no Rust guide in a Rust repo)
    - Only a subset of languages (arbitrary; on-demand loading removes the cost of shipping all)
