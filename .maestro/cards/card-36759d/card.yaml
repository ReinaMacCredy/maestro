description: 'Audit hb-014: a dependent task does not automatically see what its upstream task learned. maestro already has per-task notes.md, task blocker edges (blocked_ref kind=task, src/domain/task/doctor.rs:78-176), and this feature is already building the task.md brief (Goal/State/Acceptance/Resume/Proof). A standalone learnings store would duplicate notes.md/task.md and overlap this feature. Expands this feature''s scope from ''resume this unit'' to also ''surface upstream learnings''.'
