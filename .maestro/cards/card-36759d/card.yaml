  decision: 'hb-014 is delivered as an extension of resume-prior-task-context, not a separate feature: the dependent task''s task.md brief surfaces a concise, sanitized excerpt of upstream task learnings (reusing this feature''s existing sanitization rule). No dedicated learnings artifact; existing per-task notes are the source.'
