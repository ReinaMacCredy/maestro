description: 'feature accept is the approval moment but records only the QA declaration; this session smuggled authorization into --qa reason 7 times. Advisor narrowed the lean: constraints split by TYPE. Scope constraints (no bail! conversion, no MCP) fit non_goals and ARE gate-read. Directive/sequencing constraints (land reorg first as zero-behavior commit) are process facts, not observable end-state -- they cannot be acceptance or non_goals. Authorization provenance (who/when) is low-value in this solo agent-driven repo; the ghost-002 actor gap was a parallel-fork artifact; actor stamps stay the deferred cross-cutting question on decision-ref-integrity.'
