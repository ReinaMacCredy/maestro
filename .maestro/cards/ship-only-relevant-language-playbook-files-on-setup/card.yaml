  acceptance:
  - maestro playbook <lang> for each bundled language token (rust, python, go, typescript, javascript, cpp, csharp, dart, html-css, general) prints that guide byte-identical to the embedded file and exits 0
  - maestro playbook with no argument prints the index (how-to + available language tokens + attribution) and exits 0
  - maestro playbook <unknown-token> exits non-zero and lists the valid language tokens (no dead-end error)
  - 'maestro playbook works from any directory with no repo-root or .maestro discovery: it serves from the embedded binary and is usable before init'
  - maestro init creates no .maestro/playbook/ directory, and init --dry-run shows no playbook folder line
  - with a stale .maestro/playbook/ present, every extraction entry point (init --force, sync, update) removes it cleanly with no backup, surfacing as a normal git deletion
  - 'HARNESS.md ## Code style instructs agents to run ''maestro playbook <lang>'' rather than read .maestro/playbook/<lang>.md; the HARNESS folder version is bumped so sync/update refresh the on-disk HARNESS.md, and the harness guard snapshot is re-recorded. No CLAUDE.md/AGENTS.md mirror-block resync is needed -- those blocks are @-pointers to HARNESS.md (mirrors.rs:964-970), not embedded content, so a reword leaves mirror_plan() and the mirror bodies untouched.'
