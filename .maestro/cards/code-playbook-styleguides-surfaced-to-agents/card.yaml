schema_version: maestro.card.v1
id: code-playbook-styleguides-surfaced-to-agents
type: feature
title: Code playbook / styleguides surfaced to agents
status: shipped
created_at: 2026-06-14T13:25:55.436Z
updated_at: 2026-06-14T14:33:57.813Z
description: Agents working maestro cards have no dedicated, house coding-style guidance surface (analogous to Gemini CLI Conductor's templates/code_styleguides per-language standards). Question is whether maestro needs a new 'playbook' content type/mechanism, or whether the existing AGENTS.md hierarchy (managed by init-deep, per-area Parent/Children) is already the right surface and only needs starter content + a convention.
extra:
  schema_version: maestro.feature.v2
  outcome: 'Maestro-owned code-style playbook shipped as HARNESS.md ## Code style (v1.14.0); maestro sync now resyncs the CLAUDE.md/AGENTS.md managed mirror blocks (content-based, marker-gated, drift backed up, no-op when current).'
  non_goals:
  - Per-language style files (Conductor-style python.md/go.md/...); if ever needed they live in the init-deep per-area AGENTS.md hierarchy, not in HARNESS.md.
  affected_areas:
  - src/operations/sync (extend resync to mirror blocks)
  - src/domain/extraction/{mod.rs,extract.rs} (extract_all coverage incl. markdown mirror blocks)
  - src/domain/install/mirrors.rs (managed CLAUDE.md/AGENTS.md blocks)
  acceptance_sweeps:
  - at: 2026-06-14T14:32:37.736Z
    resolved:
    - ac-1
    - ac-2
    - ac-3
  acceptance:
  - 'maestro init/install writes a maestro-managed block (<!-- maestro:start/end --> markers) into CLAUDE.md AND AGENTS.md (CLAUDE.md uses @-import of HARNESS.md; AGENTS.md uses the plain Read-first line). Verify: run maestro init in a fresh repo, grep both files for the maestro markers.'
  - 'maestro sync resyncs the CLAUDE.md and AGENTS.md maestro-managed blocks to the binary''s shipped version (in-place block replacement preserving user content outside the markers; drifted copy backed up), so changes propagate without re-running init. Verify: in an installed repo, alter the managed block, run maestro sync, confirm the block is restored to shipped content and a backup exists.'
  - 'HARNESS.md gains a ''## Code style'' section carrying the locked language-neutral principles (version bumped; resources_version_guard row updated). Verify: maestro init a fresh repo, open .maestro/harness/HARNESS.md, confirm the section + bullets are present.'
