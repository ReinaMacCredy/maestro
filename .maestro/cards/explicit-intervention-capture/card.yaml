type: feature
title: Explicit intervention capture
status: shipped
created_at: 2026-06-06T12:24:05.898Z
updated_at: 2026-06-07T15:00:32.232Z
description: 'Human corrections are only keyword-guessed today (looks_like_correction heuristic over UserPromptSubmit events; recurring_intervention detector). User wants the moment of correction captured deliberately and precisely — ''when agent wrong i can tell them and it capture it'' — with a note of what was wrong, feeding the self-improvement loop so repeated failure modes change future behavior. DEPENDENCY: layers on the harness self-improvement v1 (mid-implementation, uncommitted); reopens none of its locks.'
