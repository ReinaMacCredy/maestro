- schema_version: maestro.card.v1
  id: dec-build-authorization-flows-accept-to-a063
  type: decision
  title: Build authorization flows accept to prepare to work without a stop
  status: locked
  parent: build-flow-runs-prepare-without-a-stop
  created_at: 2026-06-13T17:28:17.748Z
  updated_at: 2026-06-13T17:28:17.766Z
  description: 'On approving the design-to-card handoff (or saying go), the agent improvised an implement-now or stop-at-the-handoff question and treated prepare as a separate gate. This double-asks (the user already chose to build) and overloads the word handoff, which already happened at skill entry. The fork: remove the stop, or restructure the verbs. Option A (chosen) removes only the stop; it does not remove the prepare verb.'
  extra:
    locked_at: 2026-06-13T17:28:17.766Z
    decision: 'Remove the improvised implement-now/stop-at-handoff confirmation. When the user authorizes building, the lifecycle flows accept -> prepare -> work in one motion with no extra confirmation. The prepare verb and the ready state stay available for EXPLICIT freeze-and-park: accept a contract, stop, decompose and build later when asked. Handoff names only the design-to-card skill boundary (done at skill entry), not a lifecycle gate. Whether prepare pauses to show the task breakdown before creating cards is a separate fork (D2).'
    preview: |-
      BEFORE (improvised stop):
        accept (freeze contract)
             |
             v
        agent asks: "implement now, or stop at the handoff?"   <- invented, not in any skill
             |                              |
           [now]                         [stop]
             |                              |
             v                              v
         prepare -> work               feature sits ready

      AFTER (Option A: remove the stop):
        build authorized  (handoff approved / "go")
             |
             v
        accept --> prepare --> work        one motion, no extra confirmation
                      |
                      +-- decompose frozen contract into work cards (*)

        freeze-and-park stays reachable, but only when asked explicitly:
             accept --> (stop here) --> prepare + build later
             the ready state and the prepare verb exist for this

        (*) whether prepare pauses to SHOW the task breakdown before
            creating cards is decided separately -> D2 (still open)
    rejected:
    - 'B: Fold prepare into accept as one verb. Loses the freeze-and-park escape hatch the user relies on (features routinely sit accepted-but-unbuilt; e.g. zoekt design locked, not implemented). Accept must be able to freeze a contract without decomposing it.'
    - 'C: Keep a separate implement-now/stop confirmation. Redundant: the build authorization already chose to build, so a follow-up stop double-asks the same thing in vaguer words.'
- schema_version: maestro.card.v1
  id: dec-build-path-mints-work-cards-in-one-f2e7
  type: decision
  title: Build path mints work cards in one motion, reports after
  status: locked
  parent: build-flow-runs-prepare-without-a-stop
  created_at: 2026-06-13T17:40:07.535Z
  updated_at: 2026-06-13T17:40:07.553Z
  description: 'After D1 removes the stop, the next beat is prepare = decompose the frozen contract into work cards. prepare has two halves today: --draft writes a reviewable plan file, --from mints cards and starts the feature. The auto-draft is dumb (one mega-task), so the agent does the real decomposition itself. Fork: mint the cards immediately and report the split after, or show the plan file first and mint on confirm. Tradeoff surfaced and accepted by the user: minting first means cards (ids, dep edges, feature -> in_progress) exist before the split is eyeballed; this is fine because cards are reversible (close/edit) and the agent reports the breakdown immediately.'
  extra:
    locked_at: 2026-06-13T17:40:07.553Z
    decision: On the build path, after the agent decomposes the frozen contract, it runs prepare to mint the work cards and start the feature in ONE motion, then reports the breakdown. No pause to pre-approve the plan. The --draft plan-file review beat is NOT required on the build path; it stays available for explicit freeze-and-park (D1). Chosen because for a clean split this is truest to 'just go', and a wrong split is cheap to fix (close/re-cut cards) once reported.
    preview: |-
      Worked example: cross-session-run-event-awareness, 7-task split.

      You say: build it.
         |
         v
      agent decomposes the frozen contract (in context):
         T1 schema  T2 record(after T1)  T3 index(after T1)
         T4 reader(after T2,T3)  T5 enrich(after T4)
         T6 output(after T4)  T7 tests(after T5,T6)
         |
         v
      prepare --from  -> mints 7 cards + dep edges,
                        feature -> in_progress
         |
         v
      agent reports: "made 7 cards: T1 schema, T2 record,
         ... starting on T1."

      If a split is wrong you see it in the report and
      re-cut the card; nothing was pre-approved.
    rejected:
    - 'Show the plan file first, mint cards on confirm. Rejected: adds a beat to the common case where the split is clean, which cuts against ''just go''. The draft review surface still exists for the explicit freeze-and-park path when a split is genuinely debatable.'
