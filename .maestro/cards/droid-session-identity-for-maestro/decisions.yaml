- schema_version: maestro.card.v1
  id: dec-droid-session-source-hook-json-session-89d3
  type: decision
  title: Droid session source = hook JSON session_id
  status: locked
  parent: droid-session-identity-for-maestro
  created_at: 2026-06-20T20:33:39.049Z
  updated_at: 2026-06-20T20:33:39.077Z
  description: Droid does not provide a stable process environment variable comparable to CODEX_THREAD_ID or CLAUDE_CODE_SESSION_ID in ordinary shell commands. Factory hooks receive JSON stdin with session_id for UserPromptSubmit, PreToolUse, PostToolUse, Stop, SessionStart, SessionEnd, and related events. Maestro should treat hook-provided session_id as the authoritative Droid identity at hook boundaries instead of adding an unverified DROID_SESSION_ID env lookup.
  extra:
    locked_at: 2026-06-20T20:33:39.077Z
    decision: Use Droid hook JSON session_id as the Droid session identity source. Do not add a guessed Droid env var unless Factory documents or exports one later.
    preview: 'Droid hook stdin\n  session_id: <droid-session>\n        |\n        v\nmaestro hook record --session <droid-session>\n        |\n        v\n.maestro/runs/<encoded-session>/events.jsonl'
    rejected:
    - Add DROID_SESSION_ID to session_token() now without evidence; keep falling back to cli-<date> for Droid hooks; derive identity from terminal or transcript paths.
