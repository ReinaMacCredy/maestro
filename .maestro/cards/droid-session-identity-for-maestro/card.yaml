schema_version: maestro.card.v1
id: droid-session-identity-for-maestro
type: feature
title: Droid session identity for Maestro
status: closed
created_at: 2026-06-20T20:33:18.527Z
updated_at: 2026-06-21T03:10:23.062Z
description: Droid does not expose a normal shell session env var like CODEX_THREAD_ID or CLAUDE_SESSION_ID. Droid hooks do receive a session_id field in their JSON stdin, so Maestro should document and, where needed, support Droid attribution through hook-provided session ids instead of relying on env discovery alone.
extra:
  schema_version: maestro.feature.v2
  outcome: Droid hook JSON session_id attribution is documented across shipped Maestro skills and covered by regression tests; existing Claude/Codex identity behavior remains covered.
