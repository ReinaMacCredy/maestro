    - ac-2
    - ac-3
  affected_areas:
  - embedded/skills
  - embedded/hooks
  - src/foundation/core/session.rs
  - tests
  acceptance_evidence:
  - ac_id: ac-1
    kind: explicit
    text: cargo test --test hook_record_integration passed 20/20; droid_hook_payload_session_id_wins_over_agent_env proves hook JSON session_id writes to the Droid session bucket instead of env, cli-date, or unattributed buckets.
    at: 2026-06-21T03:09:10.485Z
  - ac_id: ac-2
    kind: explicit
    text: All shipped Maestro skills now include a Droid Session Identity section, and cargo test --test resources_version_guard passed 6/6 including every_shipped_skill_explains_droid_session_identity.
    at: 2026-06-21T03:09:10.485Z
  - ac_id: ac-3
    kind: explicit
    text: cargo test --test hook_record_integration passed 20/20 including cli_run_id_resolves_claude_code_session_id_into_distinct_buckets and cli_run_id_resolves_codex_thread_id_and_ignores_dead_codex_session_id.
    at: 2026-06-21T03:09:10.485Z
  acceptance:
  - Droid hook setup or shipped guidance records Maestro run events with the Droid hook JSON session_id, so consecutive tool events from one Droid session land under one stable .maestro/runs/<session>/events.jsonl bucket instead of cli-<date>.
  - 'Maestro skills explain how a Droid user can find or pass the current session id: read session_id from Droid hook JSON stdin; ordinary shell commands should not claim a DROID_SESSION_ID env var exists.'
  - Existing Claude and Codex session identity behavior remains unchanged, including CODEX_THREAD_ID and CLAUDE_CODE_SESSION_ID precedence in session_token().
