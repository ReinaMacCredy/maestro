  affected_areas:
  - src/interfaces/cli + src/operations/harness (propose verb, merge+count, provenance, audit recency + overdue hint)
  - 'src/domain/harness (schema: audit block, item source field — shared schema change with explicit-intervention-capture, after v1 lands)'
  - embedded/skills/maestro-audit (new skill) + install/extract wiring
  acceptance:
  - maestro harness propose --title <t> --evidence <e> [--topic <slug>] files a backlog item with agent-audit provenance that rides the existing lifecycle (list/show/apply/dismiss)
  - propose with a fingerprint/topic matching an existing item merges into it and adds the current session to sessions_hit; escalation thresholds apply to audit items exactly as to detector items
  - measure on an agent-audit item closes on audit silence (no re-proposal since apply) and reverts with a still-detected warning when the topic was re-proposed since apply
  - agent-audit items render their provenance in harness list/show, distinct from detector items
  - 'a bundled maestro-audit skill (installed + versioned + guard-recorded like the other six) walks: known state -> fresh repo re-read -> maestro-state cross-check -> re-propose every finding still seen (verb merges); proposals only, never implements'
  - harness.yml supports audit.every_sessions; when N distinct sessions pass without audit activity, status and task next print an overdue hint naming the maestro-audit skill
  - absent audit block = feature off; status/next output byte-identical to today
