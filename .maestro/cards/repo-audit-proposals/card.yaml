  description: 'User wants a propose command: periodically or automatically re-read the whole project from scratch and suggest improvements. Binary detectors are rule-based over maestro state only (no repo code, no LLM); doctor checks maestro-artifact integrity only (doctor.rs:63-100); the harness backlog has the full proposal lifecycle but is detector-authored only. C1 (no cron/daemon) means the trigger must be verb-time surfacing or external. Audit = agent work; storage + cadence = maestro work.'
  status: shipped
  created_at: 2026-06-06T12:28:22.048Z
