updated_at: 2026-06-20T11:30:05.336Z
description: Simplify Maestro's agent-facing CLI by adding one canonical loop entrypoint, tightening lifecycle guardrails, lowering feature-flow friction, and reducing cross-agent coordination mistakes without violating the local-first artifact model.
extra:
  schema_version: maestro.feature.v2
  outcome: Simplified Maestro agent CLI surface with next, guardrails, helpers, and coordination assertions.
  non_goals:
  - Remove hidden flat aliases in the first change.
  - Invent proof, QA baselines, acceptance waivers, or prepare plans without explicit user/agent input.
  - Auto-ship, archive, or mutate coordination links from maestro next loop mode.
