  acceptance:
  - Agents can run one canonical next command to discover the safest next action, with read-only, one-step, and bounded-loop modes clearly separated.
  - Generic card status updates cannot bypass task-owned verification lifecycle transitions; errors point to typed commands.
  - Feature-flow helpers reduce manual QA, prepare, and proof artifact editing while preserving the same durable artifact contracts.
  - Coordination improvements make current-card sender and link remedies explicit without auto-linking peers.
