description: 'Six agent-UX frictions found by auditing a real design session (2026-06-06, reduce-maestro-artifact-surface brainstorm) where an agent drove maestro end to end: 12 decisions, 7 notes appends, ~10 feature set calls. Issues are ranked: update-nag stdout pollution, decision-new round-trip cost, and missing notes verb are highest value. Evidence with file:line in notes.md.'
