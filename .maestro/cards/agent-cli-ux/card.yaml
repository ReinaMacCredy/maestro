  affected_areas:
  - cli interfaces (update/feature/task/decision/hook/init/doctor)
  - install + global skills sync
  - proof/verify gate
  - next-hint rendering
  - bundled skill docs (activate lines, lock loop)
  acceptance:
  - update notice prints to stderr; verb stdout contains only verb output
  - 'decision authoring is two-step: decision new --context [--feature] opens the fork and decision lock fills it (the one-shot --decision/--alternative/--consequence flags were superseded by spec-first-feature-workflow, a070e1cf); doctor warns on surviving placeholder text in legacy decision files'
  - feature note and task note append a YYYY-MM-DD dated line and create notes.md on first write
  - hook record --event skill_activation --skill <name> records and prints a one-line ack with the destination run dir; stdin JSON path unchanged
  - feature set list-flag help states full-list replace semantics; the clear+set conflict error explains --question alone replaces
  - init and pre-install doctor hint the detected agent, or <claude|codex> when no env signal
  - install --agent touches only the repo (repo-local .claude/skills symlink covers discovery); global skills sync is an explicit verb that warns when an agent root resolves into another git repo
  - task verify errors when harness verify commands are empty, naming fix/escape-hatch/retry; with the claims-only ack every such verification is marked claims-only in verify output, the stored record, and ship receipts
  - task complete with empty verify commands persists the completion (state needs_verification) and surfaces the fail-closed error from auto-verify with non-zero exit
  - feature accept --qa none --reason records the declaration, satisfies both QA gates, shows in ship receipt; behavioral amend clears it and re-triggers baseline+slice coverage or a fresh re-declaration
  - 'next-hints reflect QA state: qa-baseline-or-declare before accept, qa-slice before ship template, direct hints once satisfied'
  - verbs resolve archived entities with archived-status errors (inspect/restore/then); not-found only for absent ids
  - CLI-originated events land in the session dir from env or cli-YYYY-MM-DD; unattributed only for malformed hook payloads
  - blockers render inline none; task next prints a single empty-state line; resume guardrails use repo-neutral wording
