type: decision
title: ASCII is the preview format for maestro design records
status: locked
parent: design-session-spec-workflow
created_at: 2026-06-07T15:47:44.572Z
updated_at: 2026-06-07T15:47:44.600Z
description: 'Previews per design fork: maestro --preview is free text (multi-line ASCII verified round-trip via decision show in sandbox); the record consumer is an agent in a terminal; the user set the session preference that visual means inline ASCII; and reduce-maestro-artifact-surface just shrank the artifact surface binary assets would re-bloat. Four independent constraints point the same way -- this is one decision with a documented exception, not a live 3-way fork. The operator global protocol mandates ASCII AND a richer visual when possible; locking ASCII-only for .maestro records narrows that, so the rich-visual case is explicitly routed, not dropped.'
