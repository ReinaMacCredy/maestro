  acceptance:
  - Contract acceptance items carry stable ac-N ids; feature show renders each item with its id
  - task create and task set accept --covers ac-N (repeatable); feature show/prepare render per-item task coverage
  - prepare output and feature start warn on acceptance items with no covering task, naming the fix verb; neither ever blocks
  - 'bare ''feature verify <id>'' is a read-only sweep: resolves every ac-item as derived (fresh covering-task verify), slice-derived (counting qa slice with covers: ac-N), explicit, or waived, and records a sweep run'
  - feature verify --prove ac-N --evidence '<observed>' records an explicit evidence entry; --waive ac-N --reason '<why>' records a waiver that renders visibly as WAIVED with the reason
  - 'ship gains D5 condition 4: bails with gap+fix+retry wording unless the latest sweep run postdates the last behavioral amend and last settled child task AND resolved every ac-item; --dry-run previews it'
  - a sweep re-run after an invalidating event prints what settled/amended since the prior run
  - 'qa.md scenario entries may declare (covers: ac-N); a counting slice resolves the linked ac-item in the sweep'
