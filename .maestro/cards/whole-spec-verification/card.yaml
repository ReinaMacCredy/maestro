description: 'Agents verify only the scoped task/check and miss the overall spec: per-task verify proves one task''s claims (cli/verify.rs); the ship gate checks no-live-children + qa baseline bl-NNN coverage (registry.rs:597, qa.rs:117) but nothing walks the feature contract''s acceptance criteria one by one against the final artifact, and nothing sweeps across features. A dropped acceptance criterion at decomposition time is never caught.'
