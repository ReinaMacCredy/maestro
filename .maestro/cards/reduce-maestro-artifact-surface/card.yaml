schema_version: maestro.card.v1
id: reduce-maestro-artifact-surface
type: feature
title: reduce maestro artifact surface
status: shipped
created_at: 2026-06-06T07:13:24.836Z
updated_at: 2026-06-07T15:09:29.424Z
description: 'Maestro writes too many artifact files per lifecycle: 35+ artifact types across 11 areas, 12 schema versions. A single feature with 3 tasks can produce 25+ files (feature.yaml, notes.md, amend-log.yaml, baseline.md, qa-slices.yaml, prepare-draft.md, resume.md, per-task task.yaml/task.md/acceptance.yaml/verification.json/attempts/, decisions, runs, backups). Hard to manage in the repo and hard to maintain in src (every schema needs serializer + migration + tests). Goal: reduce artifact count and complexity without losing the gates that make maestro useful.'
extra:
  schema_version: maestro.feature.v2
  id: reduce-maestro-artifact-surface
  title: reduce maestro artifact surface
  description: 'Maestro writes too many artifact files per lifecycle: 35+ artifact types across 11 areas, 12 schema versions. A single feature with 3 tasks can produce 25+ files (feature.yaml, notes.md, amend-log.yaml, baseline.md, qa-slices.yaml, prepare-draft.md, resume.md, per-task task.yaml/task.md/acceptance.yaml/verification.json/attempts/, decisions, runs, backups). Hard to manage in the repo and hard to maintain in src (every schema needs serializer + migration + tests). Goal: reduce artifact count and complexity without losing the gates that make maestro useful.'
  status: shipped
  created_at: 2026-06-06T07:13:24.836Z
  updated_at: 2026-06-07T15:09:29.424Z
  affected_areas:
  - task domain + schemas
  - feature domain + registry
  - proof/verify + freshness gate
  - qa gates + qa-baseline/qa-slice skills
  - migrate verb
  - retention (backups/runs)
  - bundled skill docs
  acceptance:
  - task new creates exactly 2 files (task.yaml with inline acceptance+verification blocks, task.md); no acceptance.yaml, verification.json, or verification.attempts/ anywhere in the lifecycle
  - tasks created for a feature land in .maestro/features/<id>/tasks/ with globally unique ids allocated across both roots; standalone tasks land in .maestro/tasks/; feature_id field absent
  - 'feature new creates feature.yaml plus the spec-first scaffold (spec.md + decisions.yaml, added by the later spec-first-feature-workflow supersession, a070e1cf); feature amend appends to an amends: list inside feature.yaml; notes.md appears only on first write'
  - prepare-draft.md is deleted on successful apply and present between prepare and apply
  - QA is one qa.md per feature (scenario sections + fenced slices yaml block); accept and ship gates pass against it; baseline.md and qa-slices.yaml are never written
  - every CLI-written timestamp is RFC3339 UTC with milliseconds
  - 'task history keeps claims as a top-level field, collapses identical repeat entries with repeats: N, and never exceeds 10 entries'
  - backups/ never exceeds 3 operation snapshots and runs/ never exceeds 20 session dirs, pruned automatically
  - slug, input_type, task_type absent from new records and their CLI flags removed
  - 'the migrate verb lifts an existing repo in one run: folds files into task.yaml/feature.yaml/qa.md, relocates feature tasks, converts timestamps, strips dead fields, deletes features.yaml index + scaffold-identical notes.md + consumed drafts, performs first prune'
  - contract hash covers the frozen subset plus completion claims (id, title, acceptance, claims) so a verified task cannot gain unverified claims and stay verified (decision-004 supersedes the D6 frozen-subset-only lock); a passing verify does not invalidate its own freshness
