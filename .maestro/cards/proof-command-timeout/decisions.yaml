- schema_version: maestro.card.v1
  id: card-280e3e
  type: decision
  title: Cutoff kills the whole process group, not just the shell
  status: locked
  parent: proof-command-timeout
  created_at: 2026-06-08T07:14:49.789Z
  updated_at: 2026-06-08T07:14:56.823Z
  description: shell_command runs 'sh -c <cmd>' (src/domain/proof/commands.rs:94). Killing only the sh maestro started leaves its children (cargo test and below) running orphaned -- the timeout would stop maestro waiting but not stop the runaway. Killing the whole tree requires starting each command in its own process group and signalling the group.
  extra:
    id: card-280e3e
    title: Cutoff kills the whole process group, not just the shell
    status: locked
    feature: proof-command-timeout
    context: shell_command runs 'sh -c <cmd>' (src/domain/proof/commands.rs:94). Killing only the sh maestro started leaves its children (cargo test and below) running orphaned -- the timeout would stop maestro waiting but not stop the runaway. Killing the whole tree requires starting each command in its own process group and signalling the group.
    decision: 'Each verify command is started in its own process group; on cutoff maestro kills the entire group (Unix: setpgid via pre_exec then signal the negative pgid; Windows: job object / taskkill /T) so the command and everything it spawned stop.'
    rejected:
    - 'Kill only the shell: std .kill() on the sh process leaves cargo test and its children running in the background; the timeout fires but the runaway survives.'
    preview: start sh in its own process group; cutoff -> kill the GROUP -> maestro X sh X cargo X children all gone; no orphaned runaway
    created_at: 2026-06-08T07:14:49.789Z
    locked_at: 2026-06-08T07:14:56.823Z
- schema_version: maestro.card.v1
  id: card-735451
  type: decision
  title: Timeout recorded as exit code 124, no new proof field
  status: locked
  parent: proof-command-timeout
  created_at: 2026-06-08T07:16:12.917Z
  updated_at: 2026-06-08T07:16:12.953Z
  description: VerificationCommand is {cmd, exit_code, duration_ms} (src/domain/proof/verify_task.rs:69) and failures are exit_code != 0 (verify_task.rs:405). 124 is the conventional timeout(1) exit code, so a killed command flows through the existing failure path with no touch to the persisted verification.json. A timeout is then conveyed by the 124 convention plus an explicit message rather than a dedicated field.
  extra:
    id: card-735451
    title: Timeout recorded as exit code 124, no new proof field
    status: locked
    feature: proof-command-timeout
    context: VerificationCommand is {cmd, exit_code, duration_ms} (src/domain/proof/verify_task.rs:69) and failures are exit_code != 0 (verify_task.rs:405). 124 is the conventional timeout(1) exit code, so a killed command flows through the existing failure path with no touch to the persisted verification.json. A timeout is then conveyed by the 124 convention plus an explicit message rather than a dedicated field.
    decision: A command killed by the cutoff is recorded with exit_code = 124 and a 'timed out after <N>s' message, reusing the existing exit_code != 0 failure path. No new field is added to VerificationCommand / verification.json.
    rejected:
    - 'Explicit timed_out flag: clearer in reports but adds a persisted field to the proof schema; not worth the surface when 124 + message already conveys it.'
    preview: killed -> exit_code = 124 + 'timed out after 600s' message; flows through existing fail path; no schema change
    created_at: 2026-06-08T07:16:12.917Z
    locked_at: 2026-06-08T07:16:12.953Z
- schema_version: maestro.card.v1
  id: card-dfaa69
  type: decision
  title: Proof timeout on by default at 600s, per-repo overridable
  status: locked
  parent: proof-command-timeout
  created_at: 2026-06-08T07:13:17.159Z
  updated_at: 2026-06-08T07:13:22.200Z
  description: 'A frozen verify command hangs verify forever today (blocking .status() at src/domain/proof/commands.rs:26-29). On-by-default closes the bug for every repo at once; opt-in would leave it unfixed by default. The cargo test suite here is slow, so the default must clear any honest run and a per-repo override is the escape hatch (precedent: codex.timeout already lives in harness.yml).'
  extra:
    id: card-dfaa69
    title: Proof timeout on by default at 600s, per-repo overridable
    status: locked
    feature: proof-command-timeout
    context: 'A frozen verify command hangs verify forever today (blocking .status() at src/domain/proof/commands.rs:26-29). On-by-default closes the bug for every repo at once; opt-in would leave it unfixed by default. The cargo test suite here is slow, so the default must clear any honest run and a per-repo override is the escape hatch (precedent: codex.timeout already lives in harness.yml).'
    decision: Proof verify commands get a cutoff that is ON by default at 600s (10 min), overridable per repo via an optional harness.yml stack field. A command that exceeds the cutoff is killed and recorded as a timeout failure.
    rejected:
    - 'Off-until-opted-in: leaves the freeze-forever bug as the default behavior, fixed only for repos that explicitly set a number.'
    preview: default cutoff = 10 min, ON; frozen check -> killed at 10 min -> FAILED; slow-but-real suite -> raise the number in harness.yml
    created_at: 2026-06-08T07:13:17.159Z
    locked_at: 2026-06-08T07:13:22.200Z
