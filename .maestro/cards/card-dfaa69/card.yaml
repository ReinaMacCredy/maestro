description: 'A frozen verify command hangs verify forever today (blocking .status() at src/domain/proof/commands.rs:26-29). On-by-default closes the bug for every repo at once; opt-in would leave it unfixed by default. The cargo test suite here is slow, so the default must clear any honest run and a per-repo override is the escape hatch (precedent: codex.timeout already lives in harness.yml).'
extra:
  id: card-dfaa69
  title: Proof timeout on by default at 600s, per-repo overridable
  status: locked
  feature: proof-command-timeout
  context: 'A frozen verify command hangs verify forever today (blocking .status() at src/domain/proof/commands.rs:26-29). On-by-default closes the bug for every repo at once; opt-in would leave it unfixed by default. The cargo test suite here is slow, so the default must clear any honest run and a per-repo override is the escape hatch (precedent: codex.timeout already lives in harness.yml).'
  decision: Proof verify commands get a cutoff that is ON by default at 600s (10 min), overridable per repo via an optional harness.yml stack field. A command that exceeds the cutoff is killed and recorded as a timeout failure.
  rejected:
  - 'Off-until-opted-in: leaves the freeze-forever bug as the default behavior, fixed only for repos that explicitly set a number.'
  preview: default cutoff = 10 min, ON; frozen check -> killed at 10 min -> FAILED; slow-but-real suite -> raise the number in harness.yml
  created_at: 2026-06-08T07:13:17.159Z
  locked_at: 2026-06-08T07:13:22.200Z
