id: design-session-spec-workflow
type: feature
title: Design-session spec workflow
status: shipped
created_at: 2026-06-07T15:27:00.481Z
updated_at: 2026-06-07T16:55:50.993Z
description: 'Make maestro the single home for design sessions, at parity with the operator global Design-Session Protocol (SPEC file + Notes + VERIFY + previews + approval flip + archive bundle). Today the two systems straddle: resume-prior-task-context lives BOTH as repo-root SPEC-resume-prior-task-context.md (Status/Notes header, D1-D8 locks) AND as .maestro/features/resume-prior-task-context/ (contract + notes.md); ~40 shipped bundles sit in ~/.agents/specs/maestro/ outside maestro archive. Much parity already shipped: spec.md scaffold + decisions open/lock with --preview + feature note + feature spec render (a070e1cf), per-ac verify sweep as the VERIFY gate + ship D5 cond-4 (84ad96f1), accept freeze + archive. Gaps observed in real sessions 2026-06-06/07: no preview-asset convention beyond a text string, no authorization+constraints capture at the approve moment, no advisor-before-hard-lock step in the skill, dual spec homes.'
