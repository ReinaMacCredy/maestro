schema_version: maestro.card.v1
id: decision-ref-integrity
type: feature
title: Decision ref integrity
status: shipped
created_at: 2026-06-07T15:10:30.650Z
updated_at: 2026-06-07T16:55:45.234Z
description: 'Durable design records can vanish without notice: pre-v2, .maestro/decisions/ was deleted with ~22 locked decisions (036-057) and nothing flagged it; doctor 2026-06-07 only reported the missing dir because init expects it. Live artifacts still reference decision ids after a store deletion or hand-edit: notes.md auto-pointer lines (decision-NNN locked --), decisions.yaml supersedes: fields, acceptance texts citing decision ids. Doctor checks decision schema + placeholders (doctor.rs:222-244) but never reference resolution.'
extra:
  schema_version: maestro.feature.v2
  id: decision-ref-integrity
  title: Decision ref integrity
  description: 'Durable design records can vanish without notice: pre-v2, .maestro/decisions/ was deleted with ~22 locked decisions (036-057) and nothing flagged it; doctor 2026-06-07 only reported the missing dir because init expects it. Live artifacts still reference decision ids after a store deletion or hand-edit: notes.md auto-pointer lines (decision-NNN locked --), decisions.yaml supersedes: fields, acceptance texts citing decision ids. Doctor checks decision schema + placeholders (doctor.rs:222-244) but never reference resolution.'
  status: shipped
  created_at: 2026-06-07T15:10:30.650Z
  updated_at: 2026-06-07T16:55:45.234Z
  affected_areas:
  - src/domain/decisions (resolution helper)
  - src/interfaces/cli/doctor.rs or src/domain/task/doctor.rs (check wiring)
  open_questions:
  - should decision records carry an actor/source stamp (session id or cli-date, like run events) so parallel sessions cannot create unattributable records?
  - should there be a path to mark an already-locked decision superseded (duplicate-lock repair), or is a feature note the intended fix?
  acceptance:
  - doctor warns when a live feature notes.md decision pointer line (decision-NNN locked/superseded format) references an id that resolves in no store (global yaml, owning-feature yaml, legacy md)
  - 'doctor warns when a supersedes: field in any live decisions.yaml points at an unresolvable id'
  - each warning names the referencing file, the dangling id, and a fix hint; dangling refs alone never make doctor exit non-zero
  - 'real case: lock a feature decision, delete that feature decisions.yaml, run doctor -> warning names notes.md and the dangling decision id'
  acceptance_evidence:
  - ac_id: ac-1
    kind: explicit
    text: cargo test --test doctor_query_integration doctor_warns_on_dangling_structured_decision_refs_without_failing passed; sandbox locks a feature decision, deletes the feature decisions.yaml, and doctor warns on notes.md with the dangling id
    at: 2026-06-07T16:54:02.382Z
  - ac_id: ac-2
    kind: explicit
    text: 'cargo test --test doctor_query_integration doctor_warns_on_dangling_supersedes_but_ignores_prose_mentions passed; hand-edited supersedes: decision-999 yields a doctor warning with decisions.yaml, the record id, missing id, and fix hint'
    at: 2026-06-07T16:54:08.079Z
  - ac_id: ac-3
    kind: explicit
    text: cargo test --test doctor_query_integration doctor_warns_on_dangling_structured_decision_refs_without_failing and doctor_warns_on_dangling_supersedes_but_ignores_prose_mentions passed; both real doctor runs exit 0 with only dangling-ref warnings
    at: 2026-06-07T16:54:13.087Z
  - ac_id: ac-4
    kind: explicit
    text: cargo test --test doctor_query_integration doctor_warns_on_dangling_structured_decision_refs_without_failing passed; deleting the feature decisions.yaml after a real decision lock makes doctor warn on notes.md and decision-001
    at: 2026-06-07T16:54:17.821Z
  acceptance_sweeps:
  - at: 2026-06-07T16:54:21.580Z
    resolved:
    - ac-1
    - ac-2
    - ac-3
    - ac-4
  qa:
    surface: none
    reason: implementation verified by enhancement-walk real-entry checks
    amend_log_position: 0
  non_goals:
  - prose-wide decision-NN regex scanning of spec.md/qa.md (false-positive prone); archived features (terminal, exempt); read/write-time enforcement in decision verbs
  outcome: Implemented non-fatal doctor warnings for dangling structured decision references in feature notes and supersedes fields, with file/id/fix-hint evidence and precision tests.
