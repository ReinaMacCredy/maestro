description: VerificationCommand is {cmd, exit_code, duration_ms} (src/domain/proof/verify_task.rs:69) and failures are exit_code != 0 (verify_task.rs:405). 124 is the conventional timeout(1) exit code, so a killed command flows through the existing failure path with no touch to the persisted verification.json. A timeout is then conveyed by the 124 convention plus an explicit message rather than a dedicated field.
