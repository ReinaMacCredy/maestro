  context: VerificationCommand is {cmd, exit_code, duration_ms} (src/domain/proof/verify_task.rs:69) and failures are exit_code != 0 (verify_task.rs:405). 124 is the conventional timeout(1) exit code, so a killed command flows through the existing failure path with no touch to the persisted verification.json. A timeout is then conveyed by the 124 convention plus an explicit message rather than a dedicated field.
  decision: A command killed by the cutoff is recorded with exit_code = 124 and a 'timed out after <N>s' message, reusing the existing exit_code != 0 failure path. No new field is added to VerificationCommand / verification.json.
  rejected:
  - 'Explicit timed_out flag: clearer in reports but adds a persisted field to the proof schema; not worth the surface when 124 + message already conveys it.'
  preview: killed -> exit_code = 124 + 'timed out after 600s' message; flows through existing fail path; no schema change
