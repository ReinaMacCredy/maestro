  affected_areas:
  - src/domain/decisions (yaml store, two-step verbs, echo, auto notes pointer) + src/domain/feature (spec scaffold, note verb, composed render)
  - src/interfaces/cli (decision new/lock flags, feature note/spec verbs)
  - 'embedded skills: maestro-design rewrite (spec.md authoring, open-fork flow, drop manual notes step) + maestro-feature mention (version bumps + guard re-record)'
  - src/interfaces/cli/doctor.rs (decisions.yaml check, legacy-only placeholder scan)
  acceptance:
  - feature new scaffolds spec.md (current-state/problem/forks skeleton, NO status field) and an empty decisions.yaml in the feature dir
  - 'decision new ''<title>'' [--feature <id>] --context ''<why>'' opens a fork (status: open) in the feature''s decisions.yaml (global .maestro/decisions.yaml when no --feature) and echoes the written entry'
  - decision lock <id> --decision --rejected [--preview] [--supersedes <id>] fills the entry, flips status, and echoes the full entry; superseding a frozen legacy id records the pointer without touching the legacy file
  - 'decision lock auto-appends a dated one-line pointer (''<date>: decision-NNN locked -- <title>'') to the owning feature''s notes.md and echoes it; the maestro-design skill drops the manual notes-append step'
  - decision list/show read global yaml + per-feature yamls + frozen legacy md (marked legacy); next id = max across all three sources + 1; legacy files are never written
  - maestro feature note <id> '<line>' appends a date-stamped line to notes.md and echoes it
  - 'maestro feature spec <id> renders the design document: status derived from feature.yaml + spec.md narrative + contract + decisions with open forks prominent + recent notes; feature show stays the everyday summary and gains only a decisions line'
  - 'open_questions and open decisions have a hard boundary: a question that becomes a real fork is opened as a decision and removed from questions (skill + verb hint enforce)'
  - doctor checks decisions.yaml schema; template-placeholder scan applies to legacy md only
