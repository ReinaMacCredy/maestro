description: 'Two relations exist: blocker edges (explicit, precise, but rarely set) and same-feature siblings (automatic). Surfacing only blocker edges would leave hb-014 mostly inert since most tasks lack explicit blockers; same-feature siblings fire on the common case (feature -> ordered child tasks). Noise is managed by keeping each surfaced excerpt concise/sanitized per decision-018 rather than dumping notes.'
