  context: 'Two relations exist: blocker edges (explicit, precise, but rarely set) and same-feature siblings (automatic). Surfacing only blocker edges would leave hb-014 mostly inert since most tasks lack explicit blockers; same-feature siblings fire on the common case (feature -> ordered child tasks). Noise is managed by keeping each surfaced excerpt concise/sanitized per decision-018 rather than dumping notes.'
  decision: A task's task.md brief surfaces learnings from earlier tasks under the SAME feature (by sequence order), automatically. Each surfaced item is a concise sanitized excerpt kept short so the section stays scannable. Standalone tasks (no feature) surface nothing.
  rejected:
  - 'Blocker edges only: precise but mostly inert since tasks rarely declare task blockers. Both (blockers+siblings): widest but most noise; defer until same-feature proves insufficient.'
  preview: 'feature F: task-1,task-2,task-3 -> task-3 brief shows concise learnings from task-1+task-2; standalone tasks show nothing'
