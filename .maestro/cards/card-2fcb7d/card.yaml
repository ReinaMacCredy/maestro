  context: 'Audit 2026-06-07: contract_hash includes claims (verify_task.rs:462-469), contradicting AC11 text and the D6 design lock (hash = id/title/acceptance only). Live repro: task update --claim on a verified task makes the prior verification stale and re-verify demands proof for the new claim. Semantics are mixed: task update --help frames claims as progress records, but verify gates on completion_claims as assertions to prove.'
  decision: 'keep claims in contract_hash (user ruling 2026-06-07: option B, fail-closed). A verified task must not gain unverified claims and stay verified; claims are the assertions verify gates on. The shipped code is blessed; AC11 text amended to match; the D6 frozen-subset-only clause from the archived reduce-maestro-artifact-surface spec is superseded by this decision'
  rejected:
  - 'honor D6 and drop claims from the hash: would let task update --claim append unverified assertions to an already-verified task without invalidating it; opens a hole in the verification gate'
  preview: task verify task-N -> passed; task update task-N --claim "also fixed Y" -> verification stale, re-verify demands proof for the new claim (current shipped behavior, kept)
