description: 'Audit 2026-06-07: contract_hash includes claims (verify_task.rs:462-469), contradicting AC11 text and the D6 design lock (hash = id/title/acceptance only). Live repro: task update --claim on a verified task makes the prior verification stale and re-verify demands proof for the new claim. Semantics are mixed: task update --help frames claims as progress records, but verify gates on completion_claims as assertions to prove.'
