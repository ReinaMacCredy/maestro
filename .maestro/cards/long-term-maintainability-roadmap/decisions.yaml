  id: dec-passive-side-effect-policy-for-runtime-2a34
  type: decision
  title: Passive side-effect policy for runtime trust boundaries
  status: locked
  parent: long-term-maintainability-roadmap
  created_at: 2026-06-11T19:40:49.203Z
  updated_at: 2026-06-11T19:41:00.105Z
  description: 'Roadmap decision D7 (WS6): which side effects are allowed from passive checks, installed hooks, installer repair, and global skill sync without an explicit apply step. First-party verification 2026-06-12: passive auto-check creates .maestro/ in git repos never initialized for maestro (paths.rs:137 + safe_write.rs:22), no failure backoff (update.rs:110-119), hooks resolve maestro via caller PATH (record.sh), installer and skill sync already follow preflight/refuse/report.'
  extra:
    locked_at: 2026-06-11T19:41:00.105Z
    decision: 'Invited repos only: passive checks may read and report anywhere, but may only write (the auto-check stamp) where .maestro/ already exists - a .git-only repo is never touched and never triggers a network call. Failed checks also stamp, so offline means retry tomorrow, not on every command. The installed hook script pins the absolute path of the binary that installed it (script stays user-owned and editable as the override point). Installer shadower removal and global skill sync keep their verified preflight/refuse-or-warn/report pattern unchanged.'
    preview: 'random git repo without .maestro/: maestro status -> no .maestro/ created, no network; maestro repo: daily check, offline stamps and retries tomorrow; hook: exec /abs/path/to/maestro (pinned, script editable)'
    rejected:
    - 'No passive checks at all: curl-install users stop hearing about new releases; the problem is surprise writes, not the check itself'
    - 'Keep as-is and document: leaves .maestro/ creation in repos that never opted in and unbounded offline retries; documentation does not remove surprise state'
