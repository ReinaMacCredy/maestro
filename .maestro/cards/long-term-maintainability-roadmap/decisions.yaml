  id: dec-hot-path-read-model-scope-and-freshness-8a65
  type: decision
  title: Hot-path read-model scope and freshness proof bar
  status: locked
  parent: long-term-maintainability-roadmap
  created_at: 2026-06-11T19:44:40.933Z
  updated_at: 2026-06-11T19:44:51.953Z
  description: 'Roadmap decision D8 (WS7): which command paths justify shared read models and what freshness proof a skip/cache shortcut must carry. Spot-verification 2026-06-12: matrix double task-store scan (query.rs:374-377 + registry.rs:940-942), per-blocker decision_exists (doctor.rs:109-117), friction double traversal (query.rs:427-434), sorted_child_dirs paying then dropping metadata (fs.rs:324-359), count+max-mtime stamps foolable (policy.rs:101-158); list_archived claim refuted; grep index is the documented accelerator precedent (index.rs:6-14).'
  extra:
    locked_at: 2026-06-11T19:44:51.953Z
    decision: 'Load once per command: read models are in-memory snapshots scoped to a single command run - each store (tasks, decisions, run logs, card dirs) is read at most once per invocation and shared; no new on-disk caches. Freshness proof bar: aggregate count+mtime stamps are allowed only where a fooled skip is harmless and self-heals on the next run; any persisted accelerator must follow the grep-index precedent (content-checked or rebuild-in-place, with the real scan staying the source of truth); every WS7 fix ships with a before/after observable measure (traversal or syscall count). Filesystem helpers split into path-only and metadata-bearing traversal so callers stop paying for data they drop.'
    preview: 'query matrix: task store read 1x (was 2x); task doctor: decisions read 1x (was per-blocker); nothing new on disk; every fix shows a before/after scan count'
    rejected:
    - 'Persistent on-disk read models for status/matrix/friction: adds stale-cache failure modes and freshness machinery for cross-command wins no measurement demands yet; remains the future shape (with the D6.4-B SQLite projection) if profiling ever shows cross-command cost dominating'
    - 'Profile first, fix only the worst offender: the verified offenders are all within-one-run duplications that one structural rule fixes; ranking them first adds measurement work without changing the fix'
