  description: 'Roadmap decision D13 (WS9): what remains for concurrent multi-agent write safety, given the verified baseline - snapshot CAS + write-lock reservation markers with retryable stale-writer rejection already shipped (hb-011, commit c0a48988, store.rs:283 + fs.rs:121-142). Unknowns: unaudited write paths possibly bypassing the machinery, multi-file operation interleaving, and an undocumented concurrency model.'
