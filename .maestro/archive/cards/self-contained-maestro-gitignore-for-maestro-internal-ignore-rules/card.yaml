schema_version: maestro.card.v1
id: self-contained-maestro-gitignore-for-maestro-internal-ignore-rules
type: feature
title: Self-contained .maestro/.gitignore for maestro-internal ignore rules
status: shipped
deps:
- kind: related
  target: ship-only-relevant-language-playbook-files-on-setup
created_at: 2026-06-15T14:15:09.113Z
updated_at: 2026-06-15T15:10:22.566Z
description: 'Maestro injects all its gitignore rules as one managed block in the repo-root .gitignore (gitignore_block() in src/domain/install/mirrors.rs, written at mirror_plan call sites). This mixes maestro-internal local-only paths (.maestro/runs, channels, backups, index, install-lock.yaml, tasks/*/evidence, archive/**/...) with the user''s own root file, and means the .maestro/ directory is not self-describing. Goal: move the maestro-internal paths into a maestro-owned .maestro/.gitignore (patterns relative to .maestro/), leaving only the two paths that live OUTSIDE .maestro/ (.claude/settings.local.json, .codex/hooks.json) in a shrunken root block. Ship as a feature for all maestro users via the installer.'
extra:
  schema_version: maestro.feature.v2
  outcome: 'Maestro now writes a self-contained .maestro/.gitignore (maestro-internal local paths relative to .maestro/, with update-check folded in), stops writing any repo-root managed block, and drops .claude/settings.local.json + .codex/hooks.json from its gitignore concern (files still written). install --agent strips the legacy root block (idempotent, preserves user lines) and writes the new file in one op; uninstall removes it. Migration is install-owned: existing installs migrate on their next ''maestro install''; sync/upgrade/init leave the legacy block until then.'
  non_goals:
  - Changing how maestro writes .claude/settings.local.json or .codex/hooks.json themselves -- only their gitignore coverage is dropped.
  - Adding .claude/.gitignore or .codex/.gitignore (fully-nested layout was rejected).
  acceptance:
  - 'After a fresh maestro init/sync, .maestro/.gitignore exists and lists the maestro-internal local paths with patterns relative to .maestro/: runs/, channels/, backups/, index/, install-lock.yaml, update-check, tasks/*/evidence/, tasks/*/local/, archive/**/evidence/, archive/**/local/, archive/**/runs/.'
  - After init/sync, the repo-root .gitignore contains no maestro managed block (no '# >>> maestro >>>' markers) and none of the formerly-managed maestro lines.
  - 'Migration: running the new version''s sync on a repo that still carries the legacy root managed block removes that block from the root .gitignore while leaving user-managed root entries untouched.'
  - git status in an initialized repo does not show .maestro/update-check (the prior coverage gap is closed by .maestro/.gitignore).
  - Uninstall removes .maestro/.gitignore (it lives under .maestro/) and strips any legacy root block; no orphaned maestro lines remain in the root .gitignore.
  - Maestro no longer adds .claude/settings.local.json or .codex/hooks.json to any gitignore (documented behavior drop); the files themselves are still written by hook_config_plan unchanged.
  - 'Migration is owned by ''maestro install --agent <X>'': re-running install on a repo that still carries the legacy root maestro managed block strips that block from the repo-root .gitignore (idempotent, no-op if absent) while preserving user-managed root entries outside the markers, and writes .maestro/.gitignore in the same operation so there is no window where the maestro-internal paths are un-ignored. (sync/upgrade/init do not migrate the gitignore.)'
  amends:
  - at: 2026-06-15T14:42:15.689Z
    reason: 'Entry-point correction: original ac-3 named ''sync'' as the migration entry point, but the .gitignore mirror is owned exclusively by ''maestro install'' -- the install lock records its ownership for lock-driven uninstall, and sync/upgrade/init all structurally leave the gitignore mirror untouched. A sync-created .maestro/.gitignore would be orphaned from uninstall. ac-3 will be waived at verify and is superseded by this install-worded AC.'
    added:
      acceptance:
      - 'Migration is owned by ''maestro install --agent <X>'': re-running install on a repo that still carries the legacy root maestro managed block strips that block from the repo-root .gitignore (idempotent, no-op if absent) while preserving user-managed root entries outside the markers, and writes .maestro/.gitignore in the same operation so there is no window where the maestro-internal paths are un-ignored. (sync/upgrade/init do not migrate the gitignore.)'
