  acceptance:
  - 'Bare ''maestro list'' / ''card list'' (no filters) prints only coarse Open+InProgress cards (terminal/Closed hidden), non-archived, with a header carrying the count delta + pointer: ''N live (M closed hidden; --all)''; when nothing is hidden, ''N cards:'''
  - '''maestro list --all'' prints all non-archived cards (the pre-change default); --archived stays orthogonal (adds archived); an explicit --status/--type/--parent/--assignee/--grep filter governs the result without needing --all'
  - '''maestro list --json'' emits the SAME sliced element set as bare list (live by default, --all restores); the serialization ENCODING shape is out of scope here (ceded to sibling dense-json-encoding-for-multi-card-read-contracts); slice work touches only the selection/filter feeding the encoder, never render_list_json'
  - Bare 'maestro decision list' / 'query decisions' default to the 20 most-recent decisions by activity date (locked_at else created_at), with header 'N of M recent (--all for full; --feature <id> to scope)'; --all lists all decisions; --feature <id> scopes to one feature
  - MCP maestro_decision_list gains an 'all' boolean param (mirroring maestro_task_list) so it can reach full history; its default inherits the recent-20 window
  - 'AGENTS.md gains a one-line read-verb convention sibling to the shipped write-verb one: read verbs bound their default to the live/relevant slice, with the full set one --all (or --feature) away'
  - maestro-design SKILL.md resume guidance (the 'Stop' line that says resume from 'maestro decision list') is repointed to 'maestro decision list --feature <id>', so A3's recent-N default never strands an old feature's decisions on resume; this is NOT a reopen of A3. The 'maestro resume' command itself (prior_decisions recent-5 global, resume.rs:346) is unaffected and unchanged.
  - After the clap-model additions (list --all; decision list --all/--feature; query decisions --all/--feature), all 4 embedded reference/cli.md copies are regenerated via the ignored regenerate_cli_md test so cli_reference_freshness stays green; cli.md is excluded from the resources_version_guard tree hash (no bump for it), but the SKILL.md edit above DOES require bumping maestro-design's version and re-recording its (version, tree-hash) tuple in tests/resources_version_guard.rs.
