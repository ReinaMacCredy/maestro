updated_at: 2026-06-14T10:33:25.243Z
description: 'Read/query verbs (list, decision list, query matrix, *--json) dump the full store every call, scaling with repo size, and agents re-ingest it on every orientation. Sibling to the shipped write-confirm policy (peer card optimize-context-footprint-of-write-command-responses, which carved this out as Tier 3). Goal: bound read-verb output to the live/relevant slice by default, with full output one explicit flag away.'
extra:
  schema_version: maestro.feature.v2
  outcome: 'Bounded agent-facing read-verb output to the live/relevant slice: bare list hides coarse-closed cards (--all restores; --json same sliced set), decision list/query decisions window to recent-20 by activity (--all/--feature), MCP maestro_decision_list gained an all param, AGENTS.md read-verb convention added, maestro-design resume repointed to --feature (1.14.0). 8/8 acceptance proven, full suite green. QA gates skipped per user directive.'
  non_goals:
  - JSON serialization shape / dense encoding of multi-card --json (owned by sibling dense-json-encoding-for-multi-card-read-contracts)
  - show single-card --compact-json field semantics
  - link/msg terminal-card dead-end + active TOCTOU (tracked on idea-link-msg-active-toctou-on-terminal-cards-39a9)
  affected_areas:
  - 'src/domain/card/query.rs (list filter default: hide coarse Closed unless --all)'
  - 'src/interfaces/cli/card.rs (list render: --all flag, header line, json element set)'
  - src/interfaces/cli/decision.rs + src/interfaces/cli/query.rs (decision list / query decisions recent-N window, --all, --feature)
  - src/interfaces/mcp/tools.rs (maestro_decision_list 'all' param)
  - AGENTS.md (read-verb output convention)
  - tests (list/decision-list defaults, --all restore, json element set, recent-N window)
  - embedded/skills/maestro-design/SKILL.md (resume guidance -> 'decision list --feature <id>') + maestro-design version bump + tests/resources_version_guard.rs tuple re-record
  - embedded/skills/*/reference/cli.md (4 copies; regenerate via 'cargo test regenerate_cli_md -- --ignored' after the clap change; excluded from version guard, no bump)
