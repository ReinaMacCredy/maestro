schema_version: maestro.card.v1
id: monorepo-and-multi-service-maestro-scopes
type: feature
title: monorepo and multi-service maestro scopes
status: shipped
created_at: 2026-06-16T09:47:20.636Z
updated_at: 2026-06-16T16:19:45.296Z
description: A repo with many sub-projects (fe, be, and increasingly N microservices) where each sub-project plus the root may each carry its own .maestro. How should maestro discover, isolate, and/or coordinate across multiple/nested .maestro scopes?
extra:
  schema_version: maestro.feature.v2
  outcome: 'Monorepo/multi-service support: one root .maestro scope + a filterable project dimension (no polyrepo federation). Card base gains optional project (additive, all 6 types); declaration-gated folder->project auto-infer via projects: in harness config (overridable, byte-identical when undeclared); read surface adds --project filter + [project] badge + group-by-project (>=2 distinct) with flat dense JSON unchanged; projects: survives init/sync; maestro-setup reads bounded per-project docs into single root guidance (read-in only, no new CLI/schema surface). 6 tasks, 15/15 ACs proven on the real binary, 11/11 qa-slices. 3 wording reconciliations recorded in notes (all PASS substantively): ac-1 card.yaml path varies by type; ac-6 byte-identical sub-clause vs unconditional ac-5 badge; ac-10 gate is AND not OR. Built b2a62fba..bbabfc2f.'
