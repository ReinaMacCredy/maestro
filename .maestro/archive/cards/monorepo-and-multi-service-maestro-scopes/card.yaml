  acceptance:
  - 'Card-base project field: a card created with --project svc-pay persists ''project: svc-pay'' in .maestro/cards/<id>/card.yaml for EVERY card type (feature/task/bug/chore/idea/decision); a card created without it has no project key; pre-existing cards lacking the field still load (additive, round-trip safe via the existing extra/unknown forward-tolerance).'
  - 'Auto-infer when declared: with projects: ["*"] in harness config, ''maestro task new x'' run under <root>/svc-pay/ stores project=svc-pay with no flag; with projects: ["services/*"], running under services/pay/ stores project=pay; with projects: ["fe","be"], running under docs/ stores no project. The matched segment is the stored value.'
  - 'No declaration = no behavior change: with no projects: key in harness config, ''maestro task new x'' from any subfolder stores no project, and ''maestro list'' / ''maestro ready'' human output is byte-identical to the pre-feature binary (no project badge, no grouping). An explicit --project still sets and stores the value.'
  - 'Project filter: ''maestro list --project svc-pay'', ''maestro ready --project svc-pay'', and the card-namespaced equivalents return only cards whose stored project equals svc-pay; an unknown project name returns an empty result, not an error. status intentionally gets NO --project filter (D4 keeps status/active unchanged), though status --json still carries the project field per the JSON criterion.'
  - 'Project badge: in list/ready HUMAN output every card row carrying a project shows a [project] badge; rows with no project show no badge.'
  - 'Group-by-project with a >=2 threshold: grouping counts distinct projects over the SHOWN cards (the post-default-filter rows list already displays). ''maestro list'' without --project groups rows under project headers ONLY when >=2 distinct projects appear among the shown cards (cards with no project fall under a root/unassigned group); with 0 or 1 distinct project the list stays flat and byte-identical to today.'
  - 'JSON stays flat: ''maestro list --json'' (and ready/status --json) emit the existing dense single-line-per-item envelope with project added as one flat field; never grouped or nested, regardless of distinct-project count. Preserves the dense-JSON multi-item contract.'
  - 'projects: config survives lifecycle: a user-authored projects: declaration in harness config is preserved across ''maestro init'' (re-init/merge), ''maestro sync'', and any harness re-detection; none of these strip, reorder, or overwrite it.'
  - 'Harness config forward-compat: an existing harness config with NO projects: key still loads unchanged after this feature ships (the schema add is additive, parallel to the card-field guarantee).'
  - 'set_contract gate unchanged: setting project on a feature does NOT satisfy or alter the feature readiness gate (acceptance OR affected_areas non-empty); project and affected_areas remain independent, confirming D3''s no-interaction claim as a check rather than an assertion.'
  - 'One root scope, no federation: discovery still returns exactly one root .maestro via the existing nearest-wins walk; a card created from any subfolder lands in the single root .maestro/cards/; no cross-repo aggregation verb is added and separate git repos remain isolated.'
  - 'Setup context read-in: the maestro-setup skill enumerates a BOUNDED doc/agent-spec set (AGENTS.md, CLAUDE.md, README.md, docs/*.md, with a depth/size cap) at the repo root AND under each folder matched by the projects: declaration, and the conductor synthesizes them into the SINGLE root harness guidance with one section per project.'
  - 'Read-in only, no write-out: setup never writes maestro-managed guidance into sub-project AGENTS.md/CLAUDE.md; install/sync continue to write managed blocks only at the repo root (src/domain/install/mod.rs).'
  - 'No new surface for ingestion: context ingestion adds no CLI verb and no harness schema field; the change is maestro-setup skill content only (version-bumped + guard re-recorded). maestro stays passive.'
  - 'Single-repo unchanged: with no projects: declaration, setup reads only root docs and produces exactly one guidance section, byte-identical to today''s setup behavior.'
  open_questions:
  - 'Deferred fork: should maestro ALSO write per-project guidance OUT into each sub-project''s own AGENTS.md/CLAUDE.md? Currently rejected (contradicts D1 one-root-scope, net-new file ownership); open a separate decision only if explicitly wanted.'
