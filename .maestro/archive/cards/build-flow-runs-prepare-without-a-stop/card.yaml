schema_version: maestro.card.v1
id: build-flow-runs-prepare-without-a-stop
type: feature
title: Build flow runs prepare without a stop
status: shipped
created_at: 2026-06-13T17:22:48.123Z
updated_at: 2026-06-13T19:19:32.292Z
description: 'When the user authorizes building a feature (approving the design->card handoff, or saying go), the agent improvises an ''implement now or stop at the handoff'' confirmation and treats prepare as a separate gate. This double-asks (the user already chose to hand off / build) and the wording overloads ''handoff'' (already done at skill entry) while hiding that the next step is prepare = decompose the frozen contract into work cards. Desired: when the user signals build, the lifecycle flows accept -> prepare -> work in one motion, with the agent doing real task decomposition (not a single mega-task); ready and the prepare verb stay available only for explicit freeze-and-park.'
extra:
  schema_version: maestro.feature.v2
  outcome: Build authorization now flows accept->prepare->work in one motion (no improvised implement-now/stop confirmation); prepare mints work cards in one motion then reports (D2); ready+prepare stay for explicit freeze-and-park; both maestro-card and maestro-design pipeline one-liners name prepare. Skills bumped maestro-card 1.8.0, maestro-design 1.12.0.
  non_goals:
  - 'No CLI behavior change: accept already prints the correct next hint (src/interfaces/cli/feature.rs:75-77). This contract removes agent-improvised behavior in skill guidance, not Rust.'
  acceptance:
  - When build is authorized (design-to-card handoff approved, or the user says go/build), the agent asks NO implement-now/stop-at-handoff confirmation; the lifecycle proceeds accept -> prepare -> work without an extra yes/no.
  - On the build path, prepare mints the work cards and starts the feature in one motion, and the agent reports the resulting breakdown AFTER; there is no pause to pre-approve the plan.
  - The decomposition fed to prepare --from is dependency-ordered task cards, not the single mega-task the auto-draft produces.
  - 'The ready state and the prepare verb stay usable for explicit freeze-and-park: a user can accept a contract, stop, and decompose/build later when asked.'
  - 'Skill guidance stops overloading ''handoff'': it names only the design-to-card skill boundary (not a lifecycle gate), and the maestro-card pipeline one-liner names prepare in its order.'
  qa:
    surface: none
    reason: skill-guidance/docs only; no runtime behavior to baseline (see non-goal)
    amend_log_position: 0
