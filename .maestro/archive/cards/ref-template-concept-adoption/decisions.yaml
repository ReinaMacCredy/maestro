  description: 'ref PRODUCT_SENSE.md holds standing tradeoff-resolvers (e.g. preserve trust over fewer clicks) that are not tied to one task. Verified: maestro decision new --feature is optional (''omit for a global decision''), so feature-less standing decisions already exist; HARNESS.md rule 7 already forces precedent search (maestro list --grep --archived) before proposals.'
  extra:
    locked_at: 2026-06-12T11:36:00.070Z
    decision: 'no build, nothing to add. Standing principles ARE global decisions: mint with maestro decision new (no --feature) + lock; discovery is already mandated by HARNESS.md rule 7 precedent search. The ref bundle''s version is the same idea minus enforcement.'
