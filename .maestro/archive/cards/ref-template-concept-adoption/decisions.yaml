- schema_version: maestro.card.v1
  id: dec-adopt-ship-time-retro-nudge-7f88
  type: decision
  title: Adopt ship-time retro nudge
  status: locked
  parent: ref-template-concept-adoption
  created_at: 2026-06-12T11:35:18.888Z
  updated_at: 2026-06-12T11:35:36.686Z
  description: 'ref-template audit: the bundle''s RETRO_TEMPLATE asks ''what should become a permanent rule''. Maestro''s self-improvement loop is passive-collect only: friction query counts events, corrections=0, nothing connects signals to proposals (per self-improvement-loop-hygiene). Ship is the natural active extraction moment; ship output already has the fix-line nudge pattern.'
  extra:
    locked_at: 2026-06-12T11:35:36.686Z
    decision: 'feature ship appends a one-line retro nudge after the shipped line: ''retro: anything to make a permanent rule? record it: maestro idea new "<rule>"''. Binary only nudges; the agent acts. Build folds into self-improvement-loop-hygiene as an acceptance criterion, not a new feature.'
    preview: |-
      $ maestro feature ship my-feat
      shipped my-feat
      retro: anything to make a permanent rule?
        record it: maestro idea new "<rule>"
    rejected:
    - 'skill-only convention: prose-enforced, the exact weakness the ref bundle has'
    - 'full retro template artifact at ship: paperwork with no consumer; one question suffices'
- schema_version: maestro.card.v1
  id: dec-no-protected-areas-ship-gate-eb35
  type: decision
  title: No protected-areas ship gate
  status: locked
  parent: ref-template-concept-adoption
  created_at: 2026-06-12T11:35:46.521Z
  updated_at: 2026-06-12T11:35:46.563Z
  description: 'ref SECURITY.md mandates human review for auth/secrets/PII/payments/deploy/irreversible changes. Maestro''s risk field is stored but gates nothing (src/domain/task/mod.rs:49, set at 157, never read by any operation). Solo repo: the user personally gates feature accept and feature ship, plus the push/tag/publish hard-stop.'
  extra:
    locked_at: 2026-06-12T11:35:46.563Z
    decision: 'no build. Two human checkpoints per card already exist (accept, ship) plus the push/tag/publish hard-stop; no incident of a risky card shipping unreviewed has been observed. Fails the global-config YAGNI test (real / demanded / worth-it). Revisit trigger: an actual unreviewed-risky-ship incident, recorded via maestro event intervention --topic protected-areas.'
    rejected:
    - 'mechanized gate (protected list + ship block + approve verb): new config surface for an unobserved incident class'
    - 'HARNESS.md convention section: prose-enforced, same weakness as the ref bundle it would be copied from'
- schema_version: maestro.card.v1
  id: dec-no-architecture-invariants-surface-for-2dde
  type: decision
  title: No architecture-invariants surface for user repos
  status: locked
  parent: ref-template-concept-adoption
  created_at: 2026-06-12T11:35:59.972Z
  updated_at: 2026-06-12T11:36:00.005Z
  description: 'ref ARCHITECTURE.md is a codemap with dependency invariants (what owns what, what must not depend on what) plus known pressure points. Maestro ships only process surfaces to user repos (embedded/: HARNESS.md, RECOVERY.md, hooks, skills, shell); repo knowledge lives in the agent layer (CLAUDE.md / per-dir AGENTS.md, init-deep).'
  extra:
    locked_at: 2026-06-12T11:36:00.005Z
    decision: no build. Codemaps and invariants are the agent layer's lane; maestro owns process, not repo knowledge. A maestro-scaffolded architecture doc would be a second source of truth that goes stale next to the agent's own AGENTS.md hierarchy.
    rejected:
    - 'maestro-setup scaffolds an ARCHITECTURE.md: competes with init-deep/CLAUDE.md tooling and adds a doc maestro never reads'
- schema_version: maestro.card.v1
  id: dec-standing-principles-are-global-fa9d
