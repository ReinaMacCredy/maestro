schema_version: maestro.card.v1
id: skill-version-drift-detection-surface-sync-when-on-disk-skills-lag-the-binary
type: feature
title: 'Skill-version drift detection: surface sync when on-disk skills lag the binary'
status: shipped
deps:
- kind: related
  target: per-repo-installer-links-skills-per-skill-not-whole-folder
created_at: 2026-06-13T19:41:48.122Z
updated_at: 2026-06-14T08:53:05.817Z
description: 'Global skill cache (~/.maestro/skills, what Claude/Codex load) silently lags the binary when the binary advances out-of-band (dev rebuild + cp to ~/.local/bin, side-load) instead of via maestro install/update. The shipped auto-resync (dec-global-skill-cache-auto-resync-on-0e62) only fires on install/upgrade, so it misses this path. Result: agents load stale skills (e.g. maestro-design 1.10.0 vs embedded 1.12.0) and never see new instructions. Detect drift on command invocation and surface it.'
extra:
  schema_version: maestro.feature.v2
  outcome: run_auto_check now resyncs the global skill cache to the running binary before the curl gate, so out-of-band/non-curl binary advances no longer leave ~/.maestro/skills silently stale. Equality+prune via the existing primitive; MAESTRO_AUTO_UPDATE=0 kill switch; doctor fallback. 858 unit tests + 6-step e2e green.
  non_goals:
  - 'No per-repo skill drift: sibling skills-global-only card removes .maestro/skills; this card covers the global cache only.'
  - 'No ordered/semver comparison: equality only (dec-cache-ahead-equality-compare-cache-a597).'
  - No change to the GitHub-release update nag (curl gate + throttle stay).
  - 'No new env var and no separate resync kill switch: reuse MAESTRO_AUTO_UPDATE=0.'
  - 'No daemon/cron/background: maestro stays passive; resync piggybacks on commands already run.'
  acceptance:
  - 'Out-of-band advance is caught: after the binary advances without install/update (rebuild + cp to ~/.local/bin, any non-curl install), the next non-excluded command auto-resyncs ~/.maestro/skills to the binary embedded skills. The curl-only gate no longer blocks the cache path.'
  - 'Once per drift event: after a resync runs, subsequent commands find the cache matched and write nothing while the binary is unchanged (no churn).'
  - 'Cache mirrors binary (equality): the resync makes ~/.maestro/skills equal the binary''s embedded set -- updating changed skills AND pruning ones the binary dropped (the reused prepare/write_prepared_global_skills already prunes retired cache dirs + stale agent links; see closed bug-sync-global-skills-never-prunes-retired-0972). Running an OLDER binary resyncs DOWN to its embedded skills (and prunes skills it never had); no ordered/semver comparison is used.'
  - 'Kill switch: with MAESTRO_AUTO_UPDATE=0 set, no auto-resync write occurs on any command.'
  - 'doctor fallback: maestro doctor reports cache-vs-binary state -- warn per stale or missing skill (name + installed -> embedded), ok when all skills match the binary.'
  - 'GitHub-release nag unchanged: the existing update-available notice stays curl-only and throttled; the skill resync does not alter its gating or output.'
  - 'No redundant write after a sync: upgrade/sync skip the after-command hook (excluded in should_auto_check_after); install is NOT excluded but ran its own sync_global_skills (install.rs:24), so its post-command equality check finds the cache matched and writes nothing. No command resyncs twice.'
  qa:
    surface: none
    reason: 'user directed: skip qa baseline gate, proceed straight to implementation'
    amend_log_position: 0
  acceptance_sweeps:
