schema_version: maestro.card.v1
id: skills-global-only-remove-per-repo-extraction-and-linking
type: feature
title: 'Skills global-only: remove per-repo extraction and linking'
status: shipped
deps:
- kind: related
  target: skill-version-drift-detection-surface-sync-when-on-disk-skills-lag-the-binary
created_at: 2026-06-13T20:14:06.107Z
updated_at: 2026-06-13T23:01:50.978Z
description: 'maestro init/update extract the 4 product skills into each repo''s .maestro/skills and symlink them into .claude/skills + .codex/skills, duplicating what the global installer already manages and creating live source-of-truth drift (embedded/skills vs .maestro/skills vs ~/.maestro/skills; card 1.9.0 embedded vs 1.8.0 cached). The global installer already serves BOTH agents from the ~/.maestro/skills cache: SUPPORTED_ROOTS in global.rs links each skill into ~/.claude/skills (Claude) and ~/.agents/skills (Codex''s unified root). So per-repo skills are pure duplication with no discovery benefit. Make skills global-only: remove per-repo skill extraction and per-repo symlinks; clean up this repo (drop dogfood symlinks, untrack .maestro/skills); resync the stale global cache. No new Codex code needed -- the dual-root global installer already covers Codex via ~/.agents/skills. Supersedes the per-repo per-skill linking feature.'
extra:
  schema_version: maestro.feature.v2
  outcome: 'Skills are now global-only: removed per-repo extraction, install symlinks, and lock entries; install/upgrade prune legacy symlinks; global cache (~/.maestro/skills linked into ~/.claude + ~/.agents) is the sole discovery source. This repo''s dogfood cleaned and cache resynced to embedded 1.9.0.'
  non_goals:
  - Adding Codex global management -- already exists (global.rs SUPPORTED_ROOTS covers ~/.agents/skills); no new Codex code.
  - Changing the global installer / sync --global-skills behavior; it stays the single discovery source.
  - Fixing the release-local auto-resync trigger gap (cache lags binary because release-local copies the binary without running install/upgrade) -- owned by sibling skill-version-drift-detection; this feature resyncs once and removes the redundant 3rd copy.
  - Deleting users' existing .maestro/skills directory contents on update -- maestro stops managing it and prunes only its own recorded symlinks.
  affected_areas:
  - src/domain/extraction/mod.rs (drop extract_skills/validate_skills/preview_skills from the per-repo extract_all/validate_all/preview_all)
  - src/domain/skills/extract.rs (remove per-repo skill extraction; keep embedded source + global path)
  - src/domain/install/mod.rs (remove skill_symlink_for_agent and its install/uninstall wiring)
  - src/domain/skills/symlink.rs (delete the per-repo skill symlink module)
  - src/domain/install/mirrors.rs + lock.rs (drop per-repo skill Symlink ownership + migration prune of existing entries)
  - 'tests: skills_symlink_integration, install_uninstall_integration, init/update/extraction tests (global_skills tests stay green, unchanged)'
  - 'repo cleanup: .claude/skills dogfood symlinks + .maestro/skills tracking'
  - 'src/interfaces/cli/doctor.rs (no functional change: generic lock check stops seeing per-repo skill symlinks once they leave the lock; update the stale ''skill symlink'' doc comment at check_install; verify doctor stays green)'
  qa:
    surface: none
    reason: User elected to skip qa-baseline; behavioral coverage carried by the 5 acceptance criteria, which are themselves end-to-end (real init/install/update/doctor runs + on-disk symlink/cache checks) and replayed at verify.
    amend_log_position: 0
  acceptance_sweeps:
  - at: 2026-06-13T23:01:03.846Z
    resolved:
    - ac-1
    - ac-2
    - ac-3
    - ac-4
    - ac-5
  acceptance:
  - maestro init in a fresh repo creates .maestro/ with harness + hooks but NO .maestro/skills directory; extraction no longer writes skills into the repo.
  - maestro install --agent claude and --agent codex create no per-repo skills symlink (.claude/skills / .codex/skills -> ../.maestro/skills) and record no Symlink-kind skills entry in install-lock.
  - maestro update/install in a repo whose install-lock records a legacy per-repo skills symlink prunes that symlink (it is maestro-owned) so it no longer shadows the global cache, and does not re-create .maestro/skills; the .maestro/skills directory contents are left for the user/git to remove (maestro does not delete repo files it no longer manages).
  - 'The global path is unchanged and remains the sole discovery source: sync --global-skills (and the auto-resync on install/upgrade) extracts embedded/skills into ~/.maestro/skills and links each skill into BOTH ~/.claude/skills (Claude) and ~/.agents/skills (Codex); doctor''s skills check still passes; both agents discover all 4 skills with no per-repo copy present.'
  - 'This repo is cleaned: the .claude/skills/maestro-{card,design,audit,setup} dogfood symlinks (305da5db) are removed, .maestro/skills is deleted from the repo (no longer tracked), embedded/skills is the sole authoring source, and ~/.maestro/skills is resynced to embedded versions (maestro-card 1.9.0) so the agent reads current skills.'
