- schema_version: maestro.card.v1
  id: dec-ac-7-ship-gate-proof-recheck-widen-08ca
  type: decision
  title: 'ac-7 ship-gate proof recheck: widen slice, gate on contract_hash drift only'
  status: superseded
  parent: resume-state-readout
  created_at: 2026-06-16T09:32:13.988Z
  updated_at: 2026-06-16T09:32:14.009Z
  description: 'ac-7 as originally written described feature ship --dry-run naming a stale-proof repair, but ship_gaps_for_record (registry.rs:791) gates only on live/unverified child tasks + QA baseline/slice coverage -- it never rechecks proof freshness, so a verified-then-stale child task passes the ship gate today. User chose to consciously widen this slice (over dropping ac-7 + parking idea #2 as its own feature) to add the recheck. Grounding: stale_reasons (stale.rs:29-44) emits a ''verified_commit'' reason on every HEAD move (benign) and a ''contract_hash'' reason only when task_contract_hash (verify_task.rs:461-474: id/title/acceptance/claims/verify_command) changed since the proof was recorded (real re-verify signal). Gating on contract_hash-only keeps the gate from firing on nearly every ship. Stays within dec-extend-existing-reads-no-new-command (ship --dry-run already exists; extended, not a new command); does NOT touch the parked resume-prior-task-context scope under dec-tight-slice.'
  extra:
    locked_at: 2026-06-16T09:32:14.009Z
    decision: 'Widen the slice to deliver ac-7: add a child-task proof-freshness recheck to ship_gaps_for_record. For each verified child task, compute stale_reasons; emit a ship gap naming ''maestro task verify <id>'' ONLY when a contract_hash reason is present. A verified_commit-only staleness (HEAD moved, contract unchanged) adds no gap.'
    superseded_by: dec-ac-7-final-non-blocking-ship-time-576f
    preview: |-
      feature ship --dry-run <id>:

        contract_hash drift (task contract changed):
          stale: bl-task-7 proof -> maestro task verify bl-task-7
        verified_commit drift only (HEAD moved):
          (no gap -- benign)
    rejected:
    - 'Drop ac-7 and park idea #2 (guided ''maestro ready-to-ship'' command) as its own feature (rejected: user chose to widen now)'
    - 'Gate on any stale_reason (rejected: verified_commit drift fires on nearly every ship -> noise, not signal)'
- schema_version: maestro.card.v1
  id: dec-ac-7-final-non-blocking-ship-time-576f
  type: decision
  title: 'ac-7 final: non-blocking ship-time advisory on verified_commit staleness'
  status: locked
  parent: resume-state-readout
  created_at: 2026-06-16T09:40:36.819Z
  updated_at: 2026-06-16T09:40:36.848Z
  description: 'Supersedes dec-ac-7-ship-gate-proof-recheck-widen-08ca. That decision gated on contract_hash drift only, on the assumption a verified task''s contract_hash can drift post-verify. Grounding disproved it: every contract_hash input is frozen for a verified task -- set_checks bails on acceptance_locked (mod.rs:464; accept locks it), task update bails at mod.rs:756 (Verified is not is_live, template.rs:48-58), set_verify_command bails on Verified (mod.rs:547), and no verb mutates id/title post-create. So a contract_hash-only gate never fires. The only variant that fires is verified_commit staleness, which is benign and common (any multi-commit ship has child tasks verified at earlier commits). User chose to keep it as a NON-BLOCKING advisory rather than drop ac-7. The HEAD-moved pain is also covered on the resume/status surface by ac-5; this is a redundant ship-time reminder, accepted as low-value-but-wanted.'
  extra:
    locked_at: 2026-06-16T09:40:36.848Z
    decision: 'feature ship --dry-run prints a non-blocking, informational advisory in its ship_feature preview output (feature.rs:640-649), listing each verified child task whose proof commit differs from current HEAD: ''N child task(s) verified at older commits (HEAD moved); re-verify if their code changed: <ids>''. It does NOT block ship and adds no entry to ship_gaps_for_record. contract_hash staleness is not a separate case (provably frozen for verified tasks).'
    supersedes:
    - dec-ac-7-ship-gate-proof-recheck-widen-08ca
    preview: |-
      feature ship --dry-run <id>:
        ship preview:
          feature: ...
          note: 3 child task(s) verified at older
            commits (HEAD moved); re-verify if their
            code changed: bl-task-1, bl-task-4, bl-task-7
        (advisory; does not block ship)
    rejected:
    - 'Blocking gap on contract_hash drift in ship_gaps_for_record (rejected: contract_hash provably cannot drift for a verified task -> gate never fires)'
    - 'Drop ac-7 + park idea #2 as its own feature (rejected: user chose to keep a ship-time advisory; ac-5 covers the pain on resume/status but user wants the ship-time reminder too)'
