<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">How Maestro work flows</title>
  <desc id="desc">Workflow diagram showing Maestro's spec to ship loop: author a spec, create a task, claim, implement, record evidence, verify, and ship or continue.</desc>
  <defs>
    <pattern id="paperDots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.05" fill="#DCD6CD" opacity="0.62"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1.2 8.2 5 1 8.8Z" fill="#5F5B55"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1.2 8.2 5 1 8.8Z" fill="#C65337"/>
    </marker>
    <style>
      .title { font-family: "Plus Jakarta Sans", "Geist", system-ui, sans-serif; font-weight: 760; letter-spacing: -0.012em; }
      .body { font-family: "Geist Mono", ui-monospace, SFMono-Regular, monospace; font-weight: 460; letter-spacing: 0.02em; }
      .label { font-family: "Geist Mono", ui-monospace, SFMono-Regular, monospace; font-weight: 520; letter-spacing: 0.18em; }
      .card { fill: #EEEAE5; stroke: #6F6A63; stroke-width: 1.15; }
      .env { fill: #FAF8F4; stroke: #272521; stroke-width: 1.25; }
      .state { fill: #ECE8E3; stroke: #756F67; stroke-width: 1.05; }
      .core { fill: #F0E6DE; stroke: #C65337; stroke-width: 1.25; }
      .ghost { fill: none; stroke: #D5CEC4; stroke-width: 1.05; stroke-dasharray: 5 7; }
    </style>
  </defs>

  <rect width="1280" height="820" fill="#FAF8F4"/>
  <rect width="1280" height="820" fill="url(#paperDots)" opacity="0.72"/>

  <rect x="74" y="104" width="1132" height="578" rx="10" class="ghost"/>
  <rect x="116" y="96" width="198" height="18" rx="5" fill="#FAF8F4"/>
  <text x="215" y="109" fill="#746E66" font-size="10" class="label" text-anchor="middle">SPEC TO SHIP LOOP</text>

  <text x="100" y="746" fill="#746E66" font-size="10" class="label">LEGEND</text>
  <line x1="100" y1="720" x2="1182" y2="720" stroke="#D8D1C7" stroke-width="1"/>

  <line x1="246" y1="240" x2="330" y2="240" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="512" y1="240" x2="596" y2="240" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="778" y1="240" x2="862" y2="240" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="986" y1="296" x2="986" y2="372" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="862" y1="438" x2="778" y2="438" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="596" y1="438" x2="512" y2="438" stroke="#C65337" stroke-width="1.5" marker-end="url(#arrowAccent)"/>
  <line x1="330" y1="438" x2="246" y2="438" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>

  <path d="M182 496V592H1058V516" stroke="#5F5B55" stroke-width="1.15" stroke-dasharray="7 8" marker-end="url(#arrow)"/>
  <rect x="508" y="574" width="264" height="36" rx="18" fill="#FAF8F4" stroke="#D5CEC4" stroke-width="1"/>
  <text x="640" y="597" fill="#746E66" font-size="10" class="body" text-anchor="middle">FAIL / HUMAN / BLOCK returns to implementation</text>

  <rect x="100" y="182" width="146" height="116" rx="7" class="env"/>
  <rect x="112" y="194" width="44" height="16" rx="3" fill="#FAF8F4" stroke="#9B948B" stroke-width="0.8"/>
  <text x="134" y="206" fill="#4C4944" font-size="8" class="body" text-anchor="middle">SPEC</text>
  <text x="173" y="235" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Author scope</text>
  <text x="173" y="260" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">acceptance · risk</text>
  <text x="173" y="278" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">non-goals</text>

  <rect x="330" y="182" width="182" height="116" rx="7" class="state"/>
  <rect x="342" y="194" width="48" height="16" rx="3" fill="#EEEAE5" stroke="#9B948B" stroke-width="0.8"/>
  <text x="366" y="206" fill="#4C4944" font-size="8" class="body" text-anchor="middle">TASK</text>
  <text x="421" y="235" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Create task</text>
  <text x="421" y="260" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">frontmatter becomes</text>
  <text x="421" y="278" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">durable state</text>

  <rect x="596" y="182" width="182" height="116" rx="7" class="state"/>
  <rect x="608" y="194" width="50" height="16" rx="3" fill="#EEEAE5" stroke="#9B948B" stroke-width="0.8"/>
  <text x="633" y="206" fill="#4C4944" font-size="8" class="body" text-anchor="middle">CLAIM</text>
  <text x="687" y="235" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Claim work</text>
  <text x="687" y="260" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">contract · scope</text>
  <text x="687" y="278" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">continuation record</text>

  <rect x="862" y="182" width="248" height="116" rx="7" class="core"/>
  <rect x="874" y="194" width="44" height="16" rx="3" fill="#F7EEE8" stroke="#D88772" stroke-width="0.8"/>
  <text x="896" y="206" fill="#C65337" font-size="8" class="body" text-anchor="middle">BUILD</text>
  <text x="986" y="235" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Implement the change</text>
  <text x="986" y="260" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">small diff · tests · reviewable patch</text>

  <rect x="862" y="380" width="248" height="116" rx="7" class="state"/>
  <rect x="874" y="392" width="62" height="16" rx="3" fill="#EEEAE5" stroke="#9B948B" stroke-width="0.8"/>
  <text x="905" y="404" fill="#4C4944" font-size="8" class="body" text-anchor="middle">EVIDENCE</text>
  <text x="986" y="433" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Record proof</text>
  <text x="986" y="458" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">command rows · witness levels</text>

  <rect x="596" y="380" width="182" height="116" rx="7" class="state"/>
  <rect x="608" y="392" width="54" height="16" rx="3" fill="#EEEAE5" stroke="#9B948B" stroke-width="0.8"/>
  <text x="635" y="404" fill="#4C4944" font-size="8" class="body" text-anchor="middle">VERIFY</text>
  <text x="687" y="433" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Request verdict</text>
  <text x="687" y="458" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">PASS · FAIL</text>
  <text x="687" y="476" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">HUMAN · BLOCK</text>

  <rect x="330" y="380" width="182" height="116" rx="7" class="core"/>
  <rect x="342" y="392" width="44" height="16" rx="3" fill="#F7EEE8" stroke="#D88772" stroke-width="0.8"/>
  <text x="364" y="404" fill="#C65337" font-size="8" class="body" text-anchor="middle">PASS</text>
  <text x="421" y="433" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Ready to ship</text>
  <text x="421" y="458" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">scope checked</text>
  <text x="421" y="476" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">evidence attached</text>

  <rect x="100" y="380" width="146" height="116" rx="7" class="env"/>
  <rect x="112" y="392" width="42" height="16" rx="3" fill="#FAF8F4" stroke="#9B948B" stroke-width="0.8"/>
  <text x="133" y="404" fill="#4C4944" font-size="8" class="body" text-anchor="middle">SHIP</text>
  <text x="173" y="433" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Ship task</text>
  <text x="173" y="458" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">one task</text>
  <text x="173" y="476" fill="#4C4944" font-size="10.5" class="body" text-anchor="middle">one PR</text>

  <rect x="100" y="766" width="16" height="12" rx="3" fill="#F0E6DE" stroke="#C65337" stroke-width="1.1"/>
  <text x="126" y="776" fill="#4C4944" font-size="10" class="body">Decision or execution pivot</text>
  <rect x="322" y="766" width="16" height="12" rx="3" fill="#FAF8F4" stroke="#272521" stroke-width="1.1"/>
  <text x="348" y="776" fill="#4C4944" font-size="10" class="body">Boundary action</text>
  <rect x="498" y="766" width="16" height="12" rx="3" fill="#ECE8E3" stroke="#756F67" stroke-width="1.1"/>
  <text x="524" y="776" fill="#4C4944" font-size="10" class="body">State-backed step</text>
  <line x1="686" y1="772" x2="722" y2="772" stroke="#C65337" stroke-width="1.5" marker-end="url(#arrowAccent)"/>
  <text x="734" y="776" fill="#4C4944" font-size="10" class="body">Verified promotion</text>
</svg>
