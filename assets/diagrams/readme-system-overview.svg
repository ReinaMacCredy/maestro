<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Maestro system overview</title>
  <desc id="desc">System map showing operator and agent terminals using the Maestro CLI, which reads and writes local tools, project state, user defaults, and Mission Control.</desc>
  <defs>
    <pattern id="paperDots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.05" fill="#DCD6CD" opacity="0.62"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1.2 8.2 5 1 8.8Z" fill="#5F5B55"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1.2 8.2 5 1 8.8Z" fill="#C65337"/>
    </marker>
    <style>
      .title { font-family: "Plus Jakarta Sans", "Geist", system-ui, sans-serif; font-weight: 760; letter-spacing: -0.012em; }
      .body { font-family: "Geist Mono", ui-monospace, SFMono-Regular, monospace; font-weight: 460; letter-spacing: 0.02em; }
      .label { font-family: "Geist Mono", ui-monospace, SFMono-Regular, monospace; font-weight: 520; letter-spacing: 0.18em; }
      .card { fill: #EEEAE5; stroke: #6F6A63; stroke-width: 1.15; }
      .env { fill: #FAF8F4; stroke: #272521; stroke-width: 1.25; }
      .state { fill: #ECE8E3; stroke: #756F67; stroke-width: 1.05; }
      .ghost { fill: none; stroke: #D5CEC4; stroke-width: 1.05; stroke-dasharray: 5 7; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#FAF8F4"/>
  <rect width="1280" height="720" fill="url(#paperDots)" opacity="0.72"/>

  <rect x="58" y="168" width="242" height="318" rx="9" class="ghost"/>
  <rect x="82" y="160" width="164" height="18" rx="5" fill="#FAF8F4"/>
  <text x="164" y="173" fill="#746E66" font-size="10" class="label" text-anchor="middle">OPERATOR SURFACE</text>

  <rect x="332" y="108" width="890" height="474" rx="10" class="ghost"/>
  <rect x="382" y="100" width="168" height="18" rx="5" fill="#FAF8F4"/>
  <text x="466" y="113" fill="#746E66" font-size="10" class="label" text-anchor="middle">LOCAL WORKSPACE</text>

  <line x1="262" y1="305" x2="346" y2="360" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="262" y1="414" x2="346" y2="376" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="570" y1="333" x2="646" y2="260" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="570" y1="368" x2="646" y2="368" stroke="#C65337" stroke-width="1.5" marker-end="url(#arrowAccent)"/>
  <line x1="570" y1="403" x2="646" y2="492" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>
  <line x1="882" y1="368" x2="982" y2="368" stroke="#5F5B55" stroke-width="1.25" marker-end="url(#arrow)"/>

  <rect x="282" y="300" width="62" height="20" rx="5" fill="#FAF8F4"/>
  <text x="313" y="314" fill="#5F5B55" font-size="9" class="body" text-anchor="middle">OPERATE</text>
  <rect x="296" y="404" width="38" height="20" rx="5" fill="#FAF8F4"/>
  <text x="315" y="418" fill="#5F5B55" font-size="9" class="body" text-anchor="middle">RUN</text>
  <rect x="590" y="283" width="80" height="20" rx="5" fill="#FAF8F4"/>
  <text x="630" y="297" fill="#5F5B55" font-size="9" class="body" text-anchor="middle">READ/WRITE</text>
  <rect x="596" y="348" width="54" height="20" rx="5" fill="#FAF8F4"/>
  <text x="623" y="362" fill="#C65337" font-size="9" class="body" text-anchor="middle">STORE</text>
  <rect x="590" y="452" width="68" height="20" rx="5" fill="#FAF8F4"/>
  <text x="624" y="466" fill="#5F5B55" font-size="9" class="body" text-anchor="middle">DEFAULTS</text>
  <rect x="922" y="348" width="44" height="20" rx="5" fill="#FAF8F4"/>
  <text x="944" y="362" fill="#5F5B55" font-size="9" class="body" text-anchor="middle">VIEW</text>

  <rect x="88" y="222" width="178" height="96" rx="7" class="card"/>
  <rect x="98" y="232" width="44" height="16" rx="3" fill="#F6F3EF" stroke="#9B948B" stroke-width="0.8"/>
  <text x="120" y="244" fill="#6F6A63" font-size="8" class="body" text-anchor="middle">HUMAN</text>
  <text x="177" y="273" fill="#1F1D1A" font-size="15" class="title" text-anchor="middle">Human operator</text>
  <text x="177" y="296" fill="#4C4944" font-size="11" class="body" text-anchor="middle">approves · launches · reviews</text>

  <rect x="88" y="355" width="178" height="96" rx="7" class="card"/>
  <rect x="98" y="365" width="44" height="16" rx="3" fill="#F6F3EF" stroke="#9B948B" stroke-width="0.8"/>
  <text x="120" y="377" fill="#6F6A63" font-size="8" class="body" text-anchor="middle">AGENT</text>
  <text x="177" y="406" fill="#1F1D1A" font-size="15" class="title" text-anchor="middle">Fresh agent runs</text>
  <text x="177" y="429" fill="#4C4944" font-size="11" class="body" text-anchor="middle">Codex · Claude · Gemini · Droid</text>

  <rect x="346" y="288" width="224" height="128" rx="7" fill="#F0E6DE" stroke="#C65337" stroke-width="1.25"/>
  <rect x="358" y="300" width="44" height="16" rx="3" fill="#F7EEE8" stroke="#D88772" stroke-width="0.8"/>
  <text x="380" y="312" fill="#C65337" font-size="8" class="body" text-anchor="middle">CORE</text>
  <text x="458" y="343" fill="#1F1D1A" font-size="17" class="title" text-anchor="middle">Maestro CLI</text>
  <text x="458" y="370" fill="#4C4944" font-size="11" class="body" text-anchor="middle">mission · task · handoff · memory</text>

  <rect x="646" y="210" width="248" height="96" rx="7" class="env"/>
  <rect x="658" y="222" width="44" height="16" rx="3" fill="#FAF8F4" stroke="#9B948B" stroke-width="0.8"/>
  <text x="680" y="234" fill="#4C4944" font-size="8" class="body" text-anchor="middle">ENV</text>
  <text x="770" y="260" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Repo + local tools</text>
  <text x="770" y="282" fill="#4C4944" font-size="11" class="body" text-anchor="middle">git · config · filesystem</text>

  <rect x="646" y="322" width="248" height="104" rx="7" class="state"/>
  <rect x="658" y="334" width="50" height="16" rx="3" fill="#EEEAE5" stroke="#9B948B" stroke-width="0.8"/>
  <text x="683" y="346" fill="#4C4944" font-size="8" class="body" text-anchor="middle">STATE</text>
  <text x="770" y="373" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Project state</text>
  <text x="770" y="396" fill="#4C4944" font-size="11" class="body" text-anchor="middle">.maestro/ missions · tasks</text>

  <rect x="646" y="472" width="248" height="96" rx="7" class="state"/>
  <rect x="658" y="484" width="50" height="16" rx="3" fill="#EEEAE5" stroke="#9B948B" stroke-width="0.8"/>
  <text x="683" y="496" fill="#4C4944" font-size="8" class="body" text-anchor="middle">HOME</text>
  <text x="770" y="523" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">User defaults</text>
  <text x="770" y="546" fill="#4C4944" font-size="11" class="body" text-anchor="middle">~/.maestro/ config · graph</text>

  <rect x="982" y="312" width="228" height="112" rx="7" class="state"/>
  <rect x="994" y="324" width="50" height="16" rx="3" fill="#EEEAE5" stroke="#9B948B" stroke-width="0.8"/>
  <text x="1019" y="336" fill="#4C4944" font-size="8" class="body" text-anchor="middle">TUI</text>
  <text x="1096" y="373" fill="#1F1D1A" font-size="16" class="title" text-anchor="middle">Mission Control</text>
  <text x="1096" y="396" fill="#4C4944" font-size="11" class="body" text-anchor="middle">read-only preview · JSON</text>

  <line x1="86" y1="628" x2="1194" y2="628" stroke="#D8D1C7" stroke-width="1"/>
  <text x="86" y="652" fill="#746E66" font-size="10" class="label">LEGEND</text>

  <rect x="86" y="672" width="16" height="12" rx="3" fill="#F0E6DE" stroke="#C65337" stroke-width="1.1"/>
  <text x="112" y="682" fill="#4C4944" font-size="10" class="body">Focal control surface</text>
  <rect x="286" y="672" width="16" height="12" rx="3" fill="#FAF8F4" stroke="#272521" stroke-width="1.1"/>
  <text x="312" y="682" fill="#4C4944" font-size="10" class="body">Local environment</text>
  <rect x="500" y="672" width="16" height="12" rx="3" fill="#ECE8E3" stroke="#756F67" stroke-width="1.1"/>
  <text x="526" y="682" fill="#4C4944" font-size="10" class="body">Filesystem-backed state</text>
  <rect x="722" y="672" width="16" height="12" rx="3" fill="#EEEAE5" stroke="#6F6A63" stroke-width="1.1"/>
  <text x="748" y="682" fill="#4C4944" font-size="10" class="body">Operator or agent actor</text>
  <line x1="994" y1="678" x2="1030" y2="678" stroke="#C65337" stroke-width="1.5" marker-end="url(#arrowAccent)"/>
  <text x="1042" y="682" fill="#4C4944" font-size="10" class="body">Shared state write path</text>
</svg>
