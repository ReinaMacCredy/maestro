# Maestro v2 ArchitectureRules port: source of truth (ADR-0005).
#
# Layers list is order-significant: each layer may import only from layers
# listed earlier in the array. `providers` is the single cross-cutting boundary
# allowed to import from any layer (composition root).
#
# Enforced by the v2 architecture-lint runner (PR 12) and surfaced through the
# ArchitectureRulesPort (PR 11). The passive_harness section enforces the
# no-runner-inversion invariant from §13 of the master plan.

version: 1
forward_only: true

layers:
  - types
  - config
  - repo
  - service
  - runtime
  - ui

cross_cutting:
  # Cross-cutting layers are universally importable: any layer may import from
  # them, and they may import from any layer. Only the internal forward_only
  # chain between non-cross-cutting layers is enforced by the lint runner. See
  # docs/adr/0017-cross-cutting-import-semantics.md for the rationale.
  - providers

# Globs (relative to repo root) that scope lint application. Lint runs only
# against the layered sub-tree (config/providers/repo/runtime/service/types/ui);
# other src/ directories (features/, infra/, shared/, tui/) follow legacy
# conventions and are not subject to forward-only layer order.
lint_scope:
  - "src/config/**/*.ts"
  - "src/providers/**/*.ts"
  - "src/repo/**/*.ts"
  - "src/runtime/**/*.ts"
  - "src/service/**/*.ts"
  - "src/types/**/*.ts"
  - "src/ui/**/*.ts"

passive_harness:
  # Patterns that must not appear in production layered src code (tests/scripts exempt).
  # Enforces the "no daemon, no scheduler, no LLM call inside maestro" invariant.
  forbidden_patterns:
    - setInterval
    - setTimeout
    - cron
    - daemon
