name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            src: maestro
          - runner: windows-latest
            src: maestro.exe
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check feature boundaries
        run: bun run check:boundaries
      - name: Build compiled binary
        run: bun run build
      - name: Verify compiled binary version
        run: ./dist/${{ matrix.src }} --version
      - name: Smoke-test Mission Control renderer
        run: ./dist/${{ matrix.src }} mission-control --render-check --size 120x40
      - name: Run test suite
        run: bun run test

  advisory-typecheck:
    name: Advisory Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        run: bun run typecheck
      - name: Report advisory result
        if: always()
        run: |
          if [ "${{ steps.typecheck.outcome }}" = "failure" ]; then
            echo "::warning title=Advisory typecheck::bun run typecheck is still failing on this branch. This lane stays non-blocking while the existing TypeScript debt is reduced."
          else
            echo "Typecheck passed."
          fi
