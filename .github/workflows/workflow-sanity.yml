name: Workflow Sanity

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Optional ref to validate when called by another workflow.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: workflow-sanity-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  static-sanity:
    name: Static Sanity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Fail on tabs in workflow files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          bad = []
          for path in sorted(Path(".github/workflows").glob("*.yml")) + sorted(Path(".github/workflows").glob("*.yaml")):
              if b"\t" in path.read_bytes():
                  bad.append(str(path))

          if bad:
              print("Tabs found in workflow files:")
              for path in bad:
                  print(f"- {path}")
              sys.exit(1)
          PY
      - name: Fail on tracked merge conflict markers
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          paths = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          bad = []
          for raw in paths:
              path = Path(raw)
              try:
                  lines = path.read_text(errors="ignore").splitlines()
              except OSError:
                  continue
              for number, line in enumerate(lines, 1):
                  if line.startswith("<<<<<<< ") or line.startswith(">>>>>>> ") or line == "=======":
                      bad.append(f"{raw}:{number}: {line}")

          if bad:
              print("Tracked merge conflict markers found:")
              for item in bad:
                  print(item)
              sys.exit(1)
          PY
      - name: Check workflow governance keys
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          missing = []
          for path in sorted(Path(".github/workflows").glob("*.yml")) + sorted(Path(".github/workflows").glob("*.yaml")):
              text = path.read_text()
              if "\npermissions:" not in f"\n{text}":
                  missing.append(f"{path}: missing top-level permissions")
              if "\nconcurrency:" not in f"\n{text}":
                  missing.append(f"{path}: missing top-level concurrency")

          if missing:
              print("Workflow governance errors:")
              for item in missing:
                  print(f"- {item}")
              sys.exit(1)
          PY

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install actionlint
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.11"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL -o "$archive" "$base_url/$archive"
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL -o checksums.txt "$base_url/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep " ${archive}$" checksums.txt | sha256sum -c -
          tar -xzf "$archive" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint
      - name: Lint workflows
        run: actionlint
