# =============================================================================
# Validate PR Workflow
# =============================================================================
# Purpose: Validates pull requests before merge
#
# Checks performed:
#   1. Version sync - Ensures plugin.json and marketplace.json versions match
#   2. Changelog preview - Shows what will be added to CHANGELOG.md on merge
#
# Runs on: All pull requests targeting the main branch
# =============================================================================

name: Validate PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Check version sync
        run: |
          set -euo pipefail

          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKETPLACE_VERSION=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          
          echo "plugin.json version: $PLUGIN_VERSION"
          echo "marketplace.json version: $MARKETPLACE_VERSION"
          
          if [ "$PLUGIN_VERSION" != "$MARKETPLACE_VERSION" ]; then
            echo "::error::Version mismatch! plugin.json ($PLUGIN_VERSION) != marketplace.json ($MARKETPLACE_VERSION)"
            exit 1
          fi
          
          echo "✓ Versions are in sync"

      - name: Setup git-cliff
        uses: ./.github/actions/setup-git-cliff

      - name: Changelog preview
        run: |
          set -euo pipefail

          PREVIEW="$(git-cliff --unreleased --strip header 2>/dev/null || true)"
          if [ -z "$PREVIEW" ]; then
            PREVIEW="No conventional commits found"
          fi

          {
            echo "## 📝 Changelog Preview"
            echo ""
            echo "Changes that will be added to CHANGELOG.md when this PR is merged:"
            echo ""
            echo '```'
            echo "$PREVIEW"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  shell-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Check bash script syntax
        run: |
          set -euo pipefail
          bash -n scripts/*.sh
          bash -n .claude/scripts/*.sh
          if [ -d scripts/hooks/ecc ]; then
            find scripts/hooks/ecc -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          fi

      - name: Validate hook command references
        run: |
          set -euo pipefail
          if [ -f scripts/validate-hook-config.sh ]; then
            bash scripts/validate-hook-config.sh
          else
            echo "scripts/validate-hook-config.sh not present; skipping"
          fi

      - name: Check Node syntax for ECC hook scripts
        run: |
          set -euo pipefail
          if [ -d scripts/hooks/ecc ]; then
            if ! command -v node >/dev/null 2>&1; then
              echo "::error::node is required for ECC hook script syntax checks"
              exit 1
            fi
            files_found=0
            while IFS= read -r -d '' file; do
              files_found=1
              node --check "$file"
            done < <(find scripts/hooks/ecc -type f -name '*.js' -print0)

            if [ "$files_found" -eq 0 ]; then
              echo "No ECC JavaScript hook scripts found; skipping"
            fi
          else
            echo "scripts/hooks/ecc not present; skipping"
          fi
