name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Determine Release Eligibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve release version
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check release trigger
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_RELEASE_SUBJECT: "chore(release): v${{ steps.version.outputs.version }}"
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual release run requested."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEAD_COMMIT_SUBJECT="$(git log -1 --pretty=%s)"
          if [ "$HEAD_COMMIT_SUBJECT" = "$EXPECTED_RELEASE_SUBJECT" ]; then
            echo "Release commit detected on main."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Non-release commit detected; skipping publish jobs."
          echo "should_release=false" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Release Candidate
    needs: release-gate
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-maestro-env
      - name: Check feature boundaries
        run: bun run check:boundaries
      - name: Check agent-facing templates
        run: bun run check:agent-spec
      - name: Check built-in skills
        run: bun run check:skills
      - name: Check bundled skills
        run: bun run check:bundled-skills
      - name: Run test suite
        run: bun run test
      - name: Build compiled binary
        run: bun run build
      - name: Verify compiled binary version
        env:
          EXPECTED_VERSION: ${{ needs.release-gate.outputs.version }}
        run: |
          set -euo pipefail
          version="$(./dist/maestro --version)"
          echo "$version"
          if [[ "$version" != "$EXPECTED_VERSION"* ]]; then
            echo "::error::Expected binary version to start with $EXPECTED_VERSION, got $version"
            exit 1
          fi
      - name: Smoke-test Mission Control renderer
        run: ./dist/maestro mission-control --render-check --size 120x40

  install-smoke:
    name: Install Smoke
    needs:
      - release-gate
      - verify
    if: needs.release-gate.outputs.should_release == 'true'
    uses: ./.github/workflows/install-smoke.yml
    with:
      ref: ${{ github.sha }}
    permissions:
      contents: read

  build-assets:
    name: Build ${{ matrix.asset }}
    needs:
      - release-gate
      - verify
      - install-smoke
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: maestro-linux-x64
            src: maestro
          - runner: ubuntu-24.04-arm
            asset: maestro-linux-arm64
            src: maestro
          - runner: macos-15-intel
            asset: maestro-darwin-x64
            src: maestro
          - runner: macos-15
            asset: maestro-darwin-arm64
            src: maestro
          - runner: windows-latest
            asset: maestro-windows-x64.exe
            src: maestro.exe
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-maestro-env
      - name: Check agent-facing templates
        run: bun run check:agent-spec
      - name: Build release asset
        run: bun scripts/build.ts
      - name: Verify built asset version
        env:
          EXPECTED_VERSION: ${{ needs.release-gate.outputs.version }}
        run: |
          set -euo pipefail
          version="$(./dist/${{ matrix.src }} --version)"
          echo "$version"
          if [[ "$version" != "$EXPECTED_VERSION"* ]]; then
            echo "::error::Expected binary version to start with $EXPECTED_VERSION, got $version"
            exit 1
          fi
      - name: Stage named release asset
        run: cp "dist/${{ matrix.src }}" "dist/${{ matrix.asset }}"
      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs:
      - release-gate
      - build-assets
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-maestro-env
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: maestro-*
          merge-multiple: true
      - name: Verify expected release asset set
        run: |
          set -euo pipefail
          expected=(
            maestro-linux-x64
            maestro-linux-arm64
            maestro-darwin-x64
            maestro-darwin-arm64
            maestro-windows-x64.exe
          )
          for asset in "${expected[@]}"; do
            test -s "dist/$asset"
          done
      - name: Build release notes
        env:
          VERSION: ${{ needs.release-gate.outputs.version }}
        run: bun scripts/release-notes.ts --version "$VERSION" --output RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-gate.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          gh release create "$TAG_NAME" \
            --target "$TARGET_SHA" \
            --notes-file RELEASE_NOTES.md \
            dist/*
