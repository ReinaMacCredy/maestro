name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check feature boundaries
        run: bun run check:boundaries
      - name: Run test suite
        run: bun test
      - name: Build compiled binary
        run: bun run build
      - name: Verify compiled binary version
        run: ./dist/maestro --version
      - name: Smoke-test Mission Control renderer
        run: ./dist/maestro mission-control --render-check --size 120x40

  build-assets:
    name: Build ${{ matrix.asset }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: maestro-linux-x64
          - runner: ubuntu-24.04-arm
            asset: maestro-linux-arm64
          - runner: macos-15-intel
            asset: maestro-darwin-x64
          - runner: macos-15
            asset: maestro-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build release asset
        run: bun scripts/build.ts
      - name: Verify built asset version
        run: ./dist/maestro --version
      - name: Stage named release asset
        run: cp dist/maestro dist/${{ matrix.asset }}
      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build-assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: maestro-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
