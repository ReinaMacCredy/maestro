ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/actions/**

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**

release:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/release.yml
          - .github/workflows/release-checks.yml
          - .github/workflows/install-smoke.yml
          - scripts/build.ts
          - scripts/install-local.ts
          - scripts/install.sh
          - scripts/install.ps1
          - scripts/release-notes.ts
          - scripts/version-file.ts

scripts:
  - changed-files:
      - any-glob-to-any-file:
          - scripts/**

skills:
  - changed-files:
      - any-glob-to-any-file:
          - skills/**
          - src/infra/domain/*skill-templates.ts

tui:
  - changed-files:
      - any-glob-to-any-file:
          - src/tui/**
          - tests/unit/tui/**
          - tests/e2e/mission-control-e2e.test.ts

tests:
  - changed-files:
      - any-glob-to-any-file:
          - tests/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - docs/**
